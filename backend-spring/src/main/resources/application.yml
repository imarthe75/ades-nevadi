server:
  port: 8080
  servlet:
    session:
      cookie:
        secure: true
        same-site: lax
        http-only: true
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/plain,text/css,application/json,application/javascript

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      fail-on-empty-beans: false
  application:
    name: ades-bff
  config:
    import: "optional:vault://"
  cloud:
    vault:
      host: ${VAULT_HOST:ades-vault}
      port: ${VAULT_PORT:8200}
      scheme: http
      authentication: TOKEN
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: secret
        default-context: ades
        kv-version: 2
      config:
        lifecycle:
          enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ades-pgbouncer:6432/ades}
    username: ${SPRING_DATASOURCE_USERNAME:ades_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:changeme}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  cache:
    type: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://ades-authentik-server:9000/application/o/ades-frontend/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ades-bff
      environment: ${ENVIRONMENT:development}

ades:
  bff:
    api-prefix: /api/v1
  oidc:
    client-secret: ${OIDC_CLIENT_SECRET:}

minio:
  endpoint: ${MINIO_ENDPOINT:ades-minio:9000}
  access-key: ${MINIO_ROOT_USER:ades_minio}
  secret-key: ${MINIO_ROOT_PASSWORD:ades_minio_secret}
  secure: ${MINIO_SECURE:false}
  bucket: ${MINIO_BUCKET:tareas-entregas}

openai:
  base-url: ${OPENAI_BASE_URL:https://integrate.api.nvidia.com/v1}
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:meta/llama-3-71b-instruct}

paperless:
  url: ${PAPERLESS_URL:http://ades-paperless:8000}
  api-token: ${PAPERLESS_API_TOKEN:}

ntfy:
  url: ${NTFY_URL:http://ades-ntfy:80}
  admin-token: ${NTFY_ADMIN_TOKEN:}

authentik:
  # AD-007: token de solo-lectura (intent=api) para consultar la API de
  # Eventos de Authentik y auditar intentos de login fallidos.
  api-token: ${AUTHENTIK_API_TOKEN:}

superset:
  url: ${SUPERSET_URL:http://ades-superset:8088}
  admin-user: ${SUPERSET_ADMIN_USER:admin}
  admin-password: ${SUPERSET_ADMIN_PASSWORD:changeme}
  dashboards:
    instituto: ${SUPERSET_DASHBOARD_INSTITUTO:}
    plantel: ${SUPERSET_DASHBOARD_PLANTEL:}
    docente: ${SUPERSET_DASHBOARD_DOCENTE:}
    alumno: ${SUPERSET_DASHBOARD_ALUMNO:}


portal:
  jwt:
    secret: ${PORTAL_JWT_SECRET:cambia-este-secret-en-produccion-minimo-32-chars}
    expiry-hours: ${PORTAL_JWT_EXPIRY_HOURS:24}
  minio:
    bucket: ${PORTAL_MINIO_BUCKET:portal-convocatorias}
  base-url: ${PORTAL_BASE_URL:https://portalnvd.setag.mx}
  arco-email: ${PORTAL_ARCO_EMAIL:privacidad@nevadi.edu.mx}

logging:
  level:
    root: INFO
    mx.ades: DEBUG

timefold:
  solver:
    termination:
      spent-limit: 10m
      best-score-limit: 0hard/*soft
