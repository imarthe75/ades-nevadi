server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — todas las rutas van a index.html (Angular routing)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy — redirige a backend (solo para desarrollo local)
  location /api/ {
    proxy_pass http://ades-api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Bundles de Angular — el CLI incluye un hash de contenido en el nombre de cada
  # archivo (ej. main-XHT2K9AB.js) y genera un nombre nuevo en cada build; es
  # seguro cachearlos "para siempre" porque una actualización nunca reutiliza el
  # mismo nombre de archivo.
  location ~* \.(js|css|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Corregido 2026-07-16: imágenes estáticas sueltas en public/ (logo, fondos
  # institucionales, favicons) NO llevan hash en el nombre — con "immutable,
  # max-age=1 año" una actualización del archivo (ej. nevadi-logo.jpg) quedaba
  # invisible para cualquier navegador que ya lo hubiera cargado una vez, hasta
  # por un año (hallazgo real: logo roto reportado por el usuario, causado por
  # esto). Cache corto + revalidación en vez de "immutable".
  location ~* \.(png|jpg|jpeg|svg|webp|ico)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate";
  }
}
