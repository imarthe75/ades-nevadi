<button 
  [type]="type"
  [class]="buttonClasses"
  [disabled]="disabled"
  (click)="handleClick($event)">
  
  <span *ngIf="icon && iconPos === 'left'" [class]="icon" class="btn-icon btn-icon-left"></span>
  <span *ngIf="label" class="btn-label">{{ label }}</span>
  <span *ngIf="icon && iconPos === 'right'" [class]="icon" class="btn-icon btn-icon-right"></span>
  
</button>
