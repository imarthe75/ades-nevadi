<div class="apex-report-container">
  <div class="apex-report-header" *ngIf="title">
    <h3 class="apex-report-title">{{ title }}</h3>
  </div>

  <div class="apex-report-table-wrapper">
    <table [class]="tableClasses">
      <thead>
        <tr>
          <th *ngFor="let col of columns" 
              [style.width]="col.width"
              [class.text-left]="col.align === 'left' || !col.align"
              [class.text-center]="col.align === 'center'"
              [class.text-right]="col.align === 'right'"
              [class.sortable]="col.sortable"
              (click)="handleSort(col)">
            
            <div class="th-content">
              <span>{{ col.header }}</span>
              <span *ngIf="col.sortable" class="sort-indicator">
                <span class="pi" 
                      [ngClass]="{
                        'pi-sort-alt': sortField !== col.field,
                        'pi-sort-amount-up-alt': sortField === col.field && sortOrder === 1,
                        'pi-sort-amount-down': sortField === col.field && sortOrder === -1
                      }">
                </span>
              </span>
            </div>
            
          </th>
        </tr>
      </thead>
      
      <tbody>
        <ng-container *ngIf="data && data.length > 0; else emptyState">
          <tr *ngFor="let row of data">
            <td *ngFor="let col of columns"
                [class.text-left]="col.align === 'left' || !col.align"
                [class.text-center]="col.align === 'center'"
                [class.text-right]="col.align === 'right'">
              
              <!-- Custom Template Rendering -->
              <ng-container *ngIf="col.type === 'custom' && customCellTemplate">
                <ng-container *ngTemplateOutlet="customCellTemplate; context: { $implicit: row, column: col }"></ng-container>
              </ng-container>
              
              <!-- Badge Type -->
              <span *ngIf="col.type === 'badge'" class="apex-report-badge" [attr.data-value]="row[col.field]">
                {{ row[col.field] }}
              </span>
              
              <!-- Standard Value -->
              <span *ngIf="col.type !== 'custom' && col.type !== 'badge'">
                {{ formatCell(row, col) }}
              </span>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
    
    <ng-template #emptyState>
      <tr>
        <td [attr.colspan]="columns.length" class="apex-report-empty">
          <div class="empty-content">
            <span class="pi pi-inbox empty-icon"></span>
            <p>{{ config.emptyMessage }}</p>
          </div>
        </td>
      </tr>
    </ng-template>
  </div>
</div>
