<div class="apex-ai-interactive-report" *ngIf="report">
  <div class="ai-header">
    <div class="ai-title">
      <span class="ai-icon">✨</span>
      <h2>AI Insights for {{ report.name }}</h2>
    </div>
    <button class="btn-refresh" (click)="generateInsights()" [disabled]="loading">
      <span *ngIf="!loading">↻ Re-analyze</span>
      <span *ngIf="loading">⌛ Analyzing...</span>
    </button>
  </div>
  
  <div class="ai-insights-container" *ngIf="insights$ | async as insights">
    <div *ngFor="let insight of insights" class="insight-card" [ngClass]="'type-' + insight.type">
      <div class="insight-header">
        <span class="insight-badge">{{ insight.type | uppercase }}</span>
        <span class="insight-confidence" title="Confidence Score">
          {{ insight.confidence }}% Confidence
        </span>
      </div>
      <h3>{{ insight.title }}</h3>
      <p>{{ insight.description }}</p>
    </div>
    
    <div *ngIf="insights.length === 0" class="no-insights">
      No significant insights found for this dataset.
    </div>
  </div>
  
  <div class="ai-loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Generating AI insights using Anthropics API...</p>
  </div>
  
  <div class="grid-container">
    <apex-interactive-grid 
      [columns]="report.columns"
      [rows]="report.data"
      [editable]="false">
    </apex-interactive-grid>
  </div>
</div>
