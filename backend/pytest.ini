[pytest]
; Hallazgo real 2026-07-18: con el scope por defecto (function), cada test async
; recibe su propio event loop nuevo — pero app.core.database.engine (async engine
; de SQLAlchemy) es un singleton a nivel de módulo, creado/vinculado una sola vez.
; Al correr 2+ tests async en el mismo proceso, el engine queda atado al loop del
; PRIMER test; el segundo test (con un loop distinto) revienta con
; "RuntimeError: Event loop is closed" al reusar una conexión pooleada del loop
; viejo. Session-scope para el loop de fixtures/tests evita esto — todos los tests
; de una corrida comparten un único loop, igual que el engine.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
