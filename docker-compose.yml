# =============================================================================
# ADES — Administración Escolar Instituto Nevadi
# Docker Compose — Infraestructura completa
#
# FASES:
#   FASE 1 (activa):  postgres, valkey, authentik, seaweedfs, ades-api, ades-frontend,
#                     celery-worker, celery-beat, nginx, certbot
#   FASE 3 (activa):  superset (conectado directo a postgres)
#   FASE 4 (comentada): redpanda, debezium, clickhouse, dbt, cube
#
# REDES:
#   ades-internal  — servicios internos ADES (sin exposición directa)
#   aura-network   — red compartida con Aura Intelligence Suite (Superset, ClickHouse)
#
# USO:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   docker compose logs -f ades-api
# =============================================================================

name: ades

networks:
  ades-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  aura-network:
    #external: true   # red compartida con superset-stack-docker / Aura Suite
    # Si no existe aún: docker network create aura-network

volumes:
  postgres-data:
  valkey-data:
  seaweedfs-data:
  authentik-media:
  superset-data:
  carbone-templates:  # plantillas DOCX/XLSX para Carbone
  flowise-data:       # flujos, API keys y logs de Flowise
  ntfy-data:          # base de datos SQLite de ntfy (auth, configs)
  ntfy-cache:         # cache de mensajes e historial de ntfy
  prometheus-data:    # métricas históricas de Prometheus
  grafana-data:       # dashboards y configuración de Grafana
  n8n-data:           # workflows y credenciales de n8n
  paperless-data:     # base de datos y configuración de Paperless-ngx
  paperless-media:    # documentos PDF/imagen gestionados por Paperless-ngx
  paperless-export:   # exportaciones y backups de Paperless-ngx
  certbot-certs:   # /etc/letsencrypt — compartido entre certbot y nginx
  certbot-www:     # /var/www/certbot — webroot para ACME challenge
  vault-data:
  vault-init:
  h5p-data:       # contenido H5P: librerías, paquetes, archivos temporales

# =============================================================================
# SERVICIOS — FASE 1: INFRAESTRUCTURA BASE
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 18 + pgvector
  # Base de datos principal ADES + memoria de largo plazo del agente residente
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg18
    container_name: ades-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ades}
      POSTGRES_USER:     ${POSTGRES_USER:-ades_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      # Base adicional para Authentik
      AUTHENTIK_DB:      ${AUTHENTIK_DB:-authentik}
      AUTHENTIK_DB_USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_DB_PASS: ${AUTHENTIK_DB_PASS:?AUTHENTIK_DB_PASS requerido}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./db/scripts/init_multi_db.sh:/docker-entrypoint-initdb.d/00_init_multi_db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"    # solo localhost — no exponer en producción
    networks:
      - ades-internal
      - aura-network             # accesible desde Aura/ClickHouse/Debezium en Fase 4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ades_admin} -d ${POSTGRES_DB:-ades}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Valkey (Redis compatible) — caché, cola Celery, sesiones, memoria corta agente
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:9.1.0
    container_name: ades-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --save 60 1
      --loglevel notice
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${VALKEY_PASSWORD:?VALKEY_PASSWORD requerido}
    volumes:
      - valkey-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ---------------------------------------------------------------------------
  # SeaweedFS — almacenamiento S3 compatible para archivos, documentos y logos
  # DESACTIVADO 2026-07-13: migrado a Oracle Object Storage (bucket ades-archivos,
  # ver .env MINIO_ENDPOINT/MINIO_ACCESS_KEY/MINIO_SECRET_KEY y Vault secret/ades).
  # Dejado comentado (no borrado) por si en algún momento se opta por volver a
  # SeaweedFS — mismo patrón que Vault/Carbone antes de reactivarse. El volumen
  # seaweedfs-data no se borró, conserva los datos previos si se reactiva.
  # Nota: minio.ades.setag.mx (nginx, Filer UI) queda con 502 mientras esté apagado.
  # ---------------------------------------------------------------------------
  # seaweedfs:
  #   image: chrislusf/seaweedfs:latest
  #   container_name: ades-seaweedfs
  #   restart: unless-stopped
  #   command: server -dir=/data -s3 -s3.port=9000 -filer
  #   environment:
  #     WEED_S3_AUTH_ENABLED: "true"
  #     WEED_S3_ACCESS_KEY:   ${MINIO_ROOT_USER:-ades_minio}
  #     WEED_S3_SECRET_KEY:   ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD requerido}
  #   volumes:
  #     - seaweedfs-data:/data
  #     - ./backups:/backups
  #   ports:
  #     - "127.0.0.1:9000:9000"   # API S3
  #     - "127.0.0.1:9333:9333"   # Consola/Master
  #     - "127.0.0.1:8888:8888"   # Filer UI
  #   networks:
  #     - ades-internal
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9333/"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M

  # ---------------------------------------------------------------------------
  # Authentik — IdP OIDC/OAuth2
  # Personal docente/admin: Google Workspace SSO
  # Alumnos/Padres: cuentas locales Authentik
  # ---------------------------------------------------------------------------
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: ades-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST:          ades-valkey
      AUTHENTIK_REDIS__PASSWORD:      ${VALKEY_PASSWORD}
      AUTHENTIK_REDIS__DB:            1          # DB 1 para Authentik, DB 0 para ADES
      AUTHENTIK_POSTGRESQL__HOST:     ades-postgres
      AUTHENTIK_POSTGRESQL__USER:     ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME:     ${AUTHENTIK_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASS}
      AUTHENTIK_SECRET_KEY:            ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY requerido}
      AUTHENTIK_BOOTSTRAP_PASSWORD:   ${AUTHENTIK_BOOTSTRAP_PASSWORD:?AUTHENTIK_BOOTSTRAP_PASSWORD requerido}
      AUTHENTIK_BOOTSTRAP_TOKEN:      ${AUTHENTIK_BOOTSTRAP_TOKEN:?AUTHENTIK_BOOTSTRAP_TOKEN requerido}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_LOG_LEVEL:            warning
      # ── Email / SMTP (Zoho Mail) ───────────────────────────────
      # Puerto 465 = SSL directo | Puerto 587 = STARTTLS
      # USE_SSL y USE_TLS son mutuamente excluyentes en Django
      AUTHENTIK_EMAIL__HOST:         ${SMTP_HOST:-smtp.zoho.com}
      AUTHENTIK_EMAIL__PORT:         ${SMTP_PORT:-465}
      AUTHENTIK_EMAIL__USERNAME:     ${SMTP_USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD:     ${SMTP_PASSWORD:-}
      AUTHENTIK_EMAIL__USE_SSL:      ${SMTP_USE_SSL:-true}
      AUTHENTIK_EMAIL__USE_TLS:      ${SMTP_USE_TLS:-false}
      AUTHENTIK_EMAIL__TIMEOUT:      "10"
      AUTHENTIK_EMAIL__FROM:         ${SMTP_FROM:-admin@setag.mx}
    volumes:
      - authentik-media:/media
      # Fondo navy del login (versionado en git). Se monta dentro del media de
      # Authentik para que su endpoint /files/ lo sirva como background del flow
      # (flow.background=ades-flow-background.svg). Sobrevive a reinicializaciones.
      - ./assets/authentik/flow-background.svg:/media/public/ades-flow-background.svg:ro
      # Plantillas de correo con marca Nevadi (2026-07-16) — Django las busca
      # primero en /templates antes que en las plantillas propias de cada stage
      # de Authentik, así que sobrescriben email/base.html y las que mencionaban
      # "authentik"/"Powered by goauthentik.io" sin tocar el resto del producto.
      - ./infrastructure/authentik/templates:/templates:ro
    ports:
      - "127.0.0.1:9443:9443"   # HTTPS interno
      - "127.0.0.1:9010:9000"   # HTTP interno (detrás de nginx)
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 800M

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: ades-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST:          ades-valkey
      AUTHENTIK_REDIS__PASSWORD:      ${VALKEY_PASSWORD}
      AUTHENTIK_REDIS__DB:            1
      AUTHENTIK_POSTGRESQL__HOST:     ades-postgres
      AUTHENTIK_POSTGRESQL__USER:     ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME:     ${AUTHENTIK_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASS}
      AUTHENTIK_SECRET_KEY:            ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD:   ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN:      ${AUTHENTIK_BOOTSTRAP_TOKEN}
      AUTHENTIK_EMAIL__HOST:         ${SMTP_HOST:-smtp.gmail.com}
      AUTHENTIK_EMAIL__PORT:         ${SMTP_PORT:-587}
      AUTHENTIK_EMAIL__USERNAME:     ${SMTP_USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD:     ${SMTP_PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS:      ${SMTP_USE_TLS:-true}
      AUTHENTIK_EMAIL__TIMEOUT:      "10"
      AUTHENTIK_EMAIL__FROM:         ${SMTP_FROM:-noreply@institutonevadi.edu.mx}
    volumes:
      - authentik-media:/media
      - /var/run/docker.sock:/var/run/docker.sock          # para blueprints
      - ./infrastructure/authentik:/blueprints/custom:ro  # OIDC apps ADES
      # Plantillas de correo con marca Nevadi — el worker es quien realmente
      # renderiza y envía los correos (EmailStage corre en tareas de Celery).
      - ./infrastructure/authentik/templates:/templates:ro
    networks:
      - ades-internal
    depends_on:
      - authentik-server
    deploy:
      resources:
        limits:
          memory: 600M

  # ---------------------------------------------------------------------------
  # HashiCorp Vault — Gestión de Secretos y Credenciales
  # Modo dev-single-node (storage file, 1 shard Shamir) — suficiente para
  # centralizar y auditar secretos en un solo plantel/servidor; no es HA.
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54
    container_name: ades-vault
    restart: unless-stopped
    environment:
      SKIP_SETCAP: "true"
      # SKIP_CHOWN deliberadamente OMITIDO: el proceso vault server corre como
      # usuario "vault" (no root, aunque el entrypoint arranque como root), y
      # sin el chown normal del entrypoint /vault/data queda root:root —
      # "mkdir /vault/data/core: permission denied" al inicializar el barrier.
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - vault-data:/vault/file
      - ./infrastructure/vault/config:/vault/config:ro
      - vault-init:/vault/init
    command: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    user: root
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-init:
    image: hashicorp/vault@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54
    container_name: ades-vault-init
    depends_on:
      - vault
    environment:
      POSTGRES_USER:          ${POSTGRES_USER:-ades_admin}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD}
      API_SECRET_KEY:         ${API_SECRET_KEY}
      PII_ENCRYPTION_KEY:     ${PII_ENCRYPTION_KEY}
      VALKEY_PASSWORD:        ${VALKEY_PASSWORD}
      MINIO_ENDPOINT:         ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY:       ${MINIO_ACCESS_KEY:-ades_minio}
      MINIO_SECRET_KEY:       ${MINIO_SECRET_KEY}
      OIDC_CLIENT_SECRET:     ${OIDC_CLIENT_SECRET}
      ADES_INTERNAL_API_KEY:  ${ADES_INTERNAL_API_KEY}
    volumes:
      - vault-init:/vault/init
      - ./infrastructure/vault/scripts:/vault/scripts:ro
    entrypoint: /vault/scripts/vault-init.sh
    user: root
    networks:
      - ades-internal

  # ---------------------------------------------------------------------------
  # ADES API — FastAPI backend principal
  # ---------------------------------------------------------------------------
  ades-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-api
    restart: unless-stopped
    environment:
      # Authentik OIDC
      OIDC_ISSUER:         ${OIDC_ISSUER:-https://auth.ades.setag.mx/application/o/ades-frontend/}
      OIDC_CLIENT_ID:      ${OIDC_CLIENT_ID:-ades-frontend}
      # API Config
      ENVIRONMENT:         ${ENVIRONMENT:-development}
      SECRET_KEY:          ${API_SECRET_KEY}
      VALKEY_URL:          redis://:${VALKEY_PASSWORD}@ades-valkey:6379/0
      LOG_LEVEL:           ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-http://localhost:4200,https://escolar.institutonevadi.edu.mx}
      BASE_URL:            ${BASE_URL:-https://ades.setag.mx}
      VAULT_ADDR:          http://ades-vault:8200
      MINIO_SECURE:        ${MINIO_SECURE:-false}
      # MINIO_ENDPOINT/MINIO_ACCESS_KEY/MINIO_SECRET_KEY: servidos por Vault
      # (config.py hace os.environ.setdefault desde secret/ades) — quitados de
      # aquí para no duplicar; docker-compose ya no gana por precedencia.
      MINIO_BUCKET:        ${MINIO_BUCKET:-ades}
      # BigBlueButton — Videoconferencias (FASE 26)
      BBB_SERVER_URL:      ${BBB_SERVER_URL:-}
      BBB_SHARED_SECRET:   ${BBB_SHARED_SECRET:-}
      # Paperless-ngx — OCR de expedientes (FASE 28)
      PAPERLESS_URL:       http://ades-paperless:8000
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN:-}
      # PgBouncer — asyncpg deshabilita prepared statements vía connect_args en database.py
      # Puerto 5432 = puerto interno del contenedor pgbouncer (el 6432 es solo el mapeo del host)
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/ades
      # Conexión dedicada de solo-lectura para /chatbot/sql (mig. 154) — rol NO
      # superusuario ades_app (a diferencia de DATABASE_URL/ades_admin de arriba),
      # sujeto a las políticas RLS reales que aíslan por plantel. Ver
      # backend/app/db/chatbot_session.py.
      CHATBOT_DB_URL:      postgresql+asyncpg://ades_app:${ADES_APP_DB_PASSWORD}@ades-pgbouncer:5432/ades
    volumes:
      - ./backend:/app:cached     # hot-reload en desarrollo
      - vault-init:/vault/init:ro
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - ades-internal
    depends_on:
      pgbouncer:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ADES BFF — Spring Boot backend
  # ---------------------------------------------------------------------------
  ades-bff:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: ades-bff
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://authentik-server:9000/application/o/ades-frontend/jwks/
      # OIDC — el BFF intercambia el code por tokens en /api/v1/auth/callback.
      # El provider ades-frontend es "confidential" en Authentik, así que el
      # BFF DEBE enviar el client_secret; sin esta var Authentik responde
      # "Invalid client secret" (HTTP 400 en el callback). Ver UserController.
      OIDC_CLIENT_ID:              ${OIDC_CLIENT_ID:-ades-frontend}
      # OIDC_CLIENT_SECRET: servido por Vault (VaultInitializer) — quitado de
      # aquí para no duplicar, ya verificado que el valor en Vault coincide.
      VAULT_ENABLED:               "true"
      VAULT_HOST:                  ades-vault
      VAULT_PORT:                  8200
      # VAULT_TOKEN no se pasa aquí — entrypoint.sh lo lee de /vault/init/root_token.txt
      # (montado desde el volumen compartido vault-init) antes de arrancar el JVM.
      # SPRING_DATASOURCE_*: se deja explícito (NO se quita) — apunta directo a
      # ades-postgres en vez de pgbouncer a propósito; Vault sirve la variante
      # pgbouncer, pero JDBC en modo transacción de pgbouncer requiere
      # ?prepareThreshold=0 (ver sesión 2026-06-16 PgBouncer SCRAM fix) que no
      # está resuelto en el datasource actual — cambiarlo sin probarlo a fondo
      # arriesga romper el arranque del BFF.
      SPRING_DATASOURCE_URL:       jdbc:postgresql://ades-postgres:5432/ades
      SPRING_DATASOURCE_USERNAME:  ${POSTGRES_USER:-ades_admin}
      SPRING_DATASOURCE_PASSWORD:  ${POSTGRES_PASSWORD}
      # SPRING_DATA_REDIS_*/MINIO_*: servidos por Vault (host/puerto/password
      # verificados idénticos) — quitados de aquí para no duplicar.
      MINIO_SECURE:                ${MINIO_SECURE:-false}
      MINIO_BUCKET:                ${MINIO_BUCKET:-ades}
      # Cuenta admin de Superset — el BFF la usa para autenticarse en la API
      # REST de Superset y generar guest tokens de los dashboards BI.
      SUPERSET_ADMIN_USER:          ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD:      ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD requerido}
      # bi.ades.setag.mx — dominio público (nginx, TLS real) usado SOLO para el
      # embedUrl devuelto al navegador; las llamadas servidor-servidor del BFF
      # contra Superset siguen usando el hostname interno (superset.url).
      SUPERSET_PUBLIC_URL:          ${SUPERSET_PUBLIC_URL:-http://ades-superset:8088}
      SUPERSET_DASHBOARD_INSTITUTO: ${SUPERSET_DASHBOARD_INSTITUTO:-}
      SUPERSET_DASHBOARD_PLANTEL:   ${SUPERSET_DASHBOARD_PLANTEL:-}
      SUPERSET_DASHBOARD_DOCENTE:   ${SUPERSET_DASHBOARD_DOCENTE:-}
      SUPERSET_DASHBOARD_ALUMNO:    ${SUPERSET_DASHBOARD_ALUMNO:-}
      # AD-007: token de solo-lectura para consultar la API de Eventos de
      # Authentik (auditoría de intentos de login fallidos).
      AUTHENTIK_API_TOKEN:          ${AUTHENTIK_API_TOKEN:-}
      # Paperless-ngx — OCR de expedientes (FASE 28)
      PAPERLESS_URL:                http://ades-paperless:8000
      PAPERLESS_API_TOKEN:          ${PAPERLESS_API_TOKEN:-}
      # Cifrado PII (LFPDPPP) — curp/rfc/telefono/email_personal en ades_personas.
      PII_ENCRYPTION_KEY:           ${PII_ENCRYPTION_KEY:?PII_ENCRYPTION_KEY requerido}
      # Backfill de cifrado one-shot: solo procesa filas pii_encryption_status='pending'
      # (idempotente). Dejar en 'false' salvo para ejecutar el backfill puntual.
      PII_BACKFILL_RUN:             ${PII_BACKFILL_RUN:-false}
    volumes:
      - ./assets:/srv/assets          # imágenes públicas de convocatorias (rw para uploads)
      - vault-init:/vault/init:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - ades-internal
    depends_on:
      pgbouncer:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 768M

  # ---------------------------------------------------------------------------
  # Celery Worker — tareas asíncronas
  # Generación automática de tareas al cargar plan de estudios,
  # notificaciones, reportes batch, procesamiento de archivos
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-celery-worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
    environment:
      VAULT_ADDR:          http://ades-vault:8200
      SECRET_KEY:          ${API_SECRET_KEY}
      VALKEY_URL:          redis://:${VALKEY_PASSWORD}@ades-valkey:6379/0
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/ades
      ENVIRONMENT:         ${ENVIRONMENT:-development}
      BASE_URL:            ${BASE_URL:-https://ades.setag.mx}
      MINIO_SECURE:        ${MINIO_SECURE:-false}
      # MINIO_ENDPOINT/MINIO_ACCESS_KEY/MINIO_SECRET_KEY: servidos por Vault
      # (config.py hace os.environ.setdefault desde secret/ades).
      MINIO_BUCKET:        ${MINIO_BUCKET:-ades}
      # Paperless-ngx — OCR de expedientes (FASE 28), consumido por app/worker/tasks/ocr.py
      PAPERLESS_URL:       http://ades-paperless:8000
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN:-}
    volumes:
      - ./backend:/app:cached
      - vault-init:/vault/init:ro
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully


  # Celery Beat — tareas programadas (alertas nocturnas, refresco BI)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-celery-beat
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      VAULT_ADDR:          http://ades-vault:8200
      SECRET_KEY:          ${API_SECRET_KEY}
      VALKEY_URL:          redis://:${VALKEY_PASSWORD}@ades-valkey:6379/0
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/ades
      ENVIRONMENT:         ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app:cached
      - vault-init:/vault/init:ro
    networks:
      - ades-internal
    depends_on:
      - celery-worker
    deploy:
      resources:
        limits:
          memory: 128M

  # Celery Flower — Monitoreo visual de tareas Celery
  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-celery-flower
    restart: unless-stopped
    command: celery -A app.worker.celery_app flower --port=5555 --url-prefix=flower
    environment:
      VAULT_ADDR:          http://ades-vault:8200
      SECRET_KEY:          ${API_SECRET_KEY}
      VALKEY_URL:          redis://:${VALKEY_PASSWORD}@ades-valkey:6379/0
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/ades
      ENVIRONMENT:         ${ENVIRONMENT:-development}
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - ./backend:/app:cached
    networks:
      - ades-internal
    depends_on:
      - celery-worker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # ADES Frontend — Angular + PrimeNG
  # En desarrollo sirve con ng serve; en producción build estático vía nginx
  # ---------------------------------------------------------------------------
  ades-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
    container_name: ades-frontend
    restart: unless-stopped
    environment:
      API_URL:      http://ades-api:8000
      OIDC_ISSUER:  ${OIDC_ISSUER}
    ports:
      - "127.0.0.1:4200:80"     # producción: nginx estático en 80 (dev: cambiar a :4200 + ver volumes en git history)
    networks:
      - ades-internal
    depends_on:
      - ades-api

  # ---------------------------------------------------------------------------
  # Portal Público de Convocatorias — portalnvd.setag.mx
  # Angular 22 SPA servida por nginx estático
  # ---------------------------------------------------------------------------
  ades-portal:
    build:
      context: ./frontend-portal
      dockerfile: Dockerfile
      target: ${PORTAL_BUILD_TARGET:-production}
    container_name: ades-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:4201:80"
    networks:
      - ades-internal
    depends_on:
      - ades-bff

  # ---------------------------------------------------------------------------
  # Apache Superset 6.1.0 — BI y dashboards
  # Conectado a PostgreSQL ADES directamente en Fase 1-3
  # En Fase 4 se conecta a ClickHouse vía Cube.js
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: ./integrations/superset
      dockerfile: Dockerfile
    container_name: ades-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY:         ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY requerido}
      SUPERSET_DATABASE_URI:       postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ades-postgres:5432/superset
      REDIS_URL:                   redis://:${VALKEY_PASSWORD}@ades-valkey:6379/2
      # Cuenta admin
      SUPERSET_ADMIN_USER:         ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD:     ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD requerido}
      SUPERSET_ADMIN_EMAIL:        ${SUPERSET_ADMIN_EMAIL:-admin@setag.mx}
      # OIDC con Authentik
      OIDC_CLIENT_ID:              ${SUPERSET_OIDC_CLIENT_ID:-superset}
      OIDC_CLIENT_SECRET:          ${SUPERSET_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER:                 ${SUPERSET_OIDC_ISSUER:-https://auth.ades.setag.mx/application/o/superset/}
      OIDC_DISCOVERY_URL:          ${OIDC_DISCOVERY_URL:-https://auth.ades.setag.mx/application/o/superset/.well-known/openid-configuration}
      OIDC_SCOPES:                 ${OIDC_SCOPES:-openid email profile}
      # Contraseña del usuario superset_ro
      SUPERSET_RO_PASSWORD:        ${SUPERSET_RO_PASSWORD}
    volumes:
      - superset-data:/app/superset_home
    ports:
      - "127.0.0.1:8088:8088"
    networks:
      - ades-internal
      - aura-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 800M

  # ---------------------------------------------------------------------------
  # Carbone — generador de reportes PDF/DOCX a partir de plantillas Word/Excel
  # FASE 18: Boletas, constancias, kardex, reportes de conducta, credencial (PE-014)
  # API interna: POST /render/:templateId  POST /templates
  # Reactivado 2026-07-13 — 7.3GB RAM libres de 11GB, límite 1G aquí es seguro.
  # ---------------------------------------------------------------------------
  carbone:
    build:
      context: ./integrations/carbone
      dockerfile: Dockerfile
    container_name: ades-carbone
    restart: unless-stopped
    environment:
      PORT:          3000
      TEMPLATES_DIR: /app/templates
    volumes:
      - carbone-templates:/app/templates
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Flowise — constructor visual de flujos de IA (chatbots, agentes, RAG)
  # FASE 17: Chatbot pedagógico + NL→SQL sobre ades_*
  # UI admin: http://localhost:3002 (acceso local solo para configurar flujos)
  # DESACTIVADO: Servidor limitado (2 cores, 12GB). Habilitar con más recursos
  # ---------------------------------------------------------------------------
  # flowise:
  #   image: flowiseai/flowise:latest
  #   container_name: ades-flowise
  #   restart: unless-stopped
  #   environment:
  #     PORT:                  3000
  #     FLOWISE_USERNAME:      ${FLOWISE_USERNAME:-admin}
  #     FLOWISE_PASSWORD:      ${FLOWISE_PASSWORD}
  #     FLOWISE_SECRETKEY_OVERWRITE: ${FLOWISE_SECRET_KEY}
  #     DATABASE_PATH:         /root/.flowise
  #     APIKEY_PATH:           /root/.flowise
  #     LOG_PATH:              /root/.flowise/logs
  #     OVERRIDE_DATABASE:     true
  #   volumes:
  #     - flowise-data:/root/.flowise
  #   ports:
  #     - "127.0.0.1:3002:3000"
  #   networks:
  #     - ades-internal
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/version"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G

  # ---------------------------------------------------------------------------
  # ntfy — push notifications sin Firebase
  # FASE 20: alertas académicas en tiempo real a padres, docentes y alumnos
  # Topics: ades_{usuario_id}  Canal de suscripción por usuario
  # DESACTIVADO: Servidor limitado (2 cores, 12GB). Habilitar con más recursos
  ntfy:
    image: binwiederhier/ntfy@sha256:a6d335064ae927c4dbef118e1fa39656b3d2e01472b2a82af5915d5cebfe815f
    container_name: ades-ntfy
    restart: unless-stopped
    command: serve --base-url http://ades-ntfy:80 --behind-proxy
    environment:
      TZ: America/Mexico_City
      NTFY_BASE_URL:          ${NTFY_BASE_URL:-http://notify.ades.setag.mx}
      NTFY_CACHE_FILE:        /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE:         /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: read-only
      NTFY_BEHIND_PROXY:      "true"
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ntfy-cache:/var/cache/ntfy
    ports:
      - "127.0.0.1:2586:80"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Stirling-PDF — procesamiento de PDF (merge, OCR, watermark, compress)
  # FASE 21: complemento de Carbone para boletas grupales y expedientes
  # DESACTIVADO: Servidor limitado (2 cores, 12GB). Habilitar con más recursos
  # ---------------------------------------------------------------------------
  # stirling-pdf:
  #   image: frooodle/s-pdf:latest
  #   container_name: ades-stirling-pdf
  #   restart: unless-stopped
  #   environment:
  #     DOCKER_ENABLE_SECURITY:      "false"
  #     LANGS:                       "es_MX"
  #     SYSTEM_DEFAULTLOCALE:        es-MX
  #     SYSTEM_GOOGLEVISIBILITY:     "false"
  #     UI_APPNAME:                  "ADES PDF"
  #     UI_HOMEDESCRIPTION:          "Procesamiento PDF — Instituto Nevadi"
  #     JAVA_TOOL_OPTIONS: >-
  #       -XX:+ExitOnOutOfMemoryError
  #       -XX:+UseG1GC
  #       -XX:MaxGCPauseMillis=200
  #       -XX:G1HeapRegionSize=4m
  #       -XX:G1PeriodicGCInterval=60000
  #       -XX:+UseStringDeduplication
  #       -XX:+ExplicitGCInvokesConcurrent
  #       -Dspring.threads.virtual.enabled=true
  #       -Djava.awt.headless=true
  #       -XX:InitialRAMPercentage=25
  #       -XX:MaxRAMPercentage=65
  #       -XX:MaxMetaspaceSize=256m
  #   ports:
  #     - "127.0.0.1:8081:8080"
  #   networks:
  #     - ades-internal
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
  #     interval: 30s
  #     timeout: 15s
  #     retries: 3
  #     start_period: 90s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1.5G

  # ---------------------------------------------------------------------------
  # Node Exporter — métricas de host (CPU, memoria, disco) para Prometheus
  # FASE 35: monitoreo de disco — el servidor solo tenía métricas a nivel de BD
  # (pg_database_size_bytes); esto añade visibilidad real del disco del host.
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: ades-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($$|/)'
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - ades-internal
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Prometheus — recolección de métricas
  # FASE 22: scrape FastAPI /metrics, node-exporter, postgres-exporter
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    container_name: ades-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Grafana — dashboards de monitoreo y BI operativo
  # FASE 22: latencia API, uptime servicios, alertas operacionales
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    container_name: ades-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL:                ${GRAFANA_URL:-http://monitor.ades.setag.mx}
      GF_SECURITY_ADMIN_USER:           ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:       ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:           "false"
      # Corregido 2026-07-16: con auth_basic ahora exigido en nginx (location / de
      # monitor.ades.setag.mx) para todo el vhost, el acceso anónimo de Grafana ya
      # no es necesario y quedaba como segunda vía de exposición sin credenciales
      # si nginx se reconfigura mal en el futuro — defensa en profundidad.
      GF_AUTH_ANONYMOUS_ENABLED:        "false"
      GF_SECURITY_ALLOW_EMBEDDING:      "true"
      GF_INSTALL_PLUGINS:               "grafana-piechart-panel"
      GF_PATHS_PROVISIONING:            /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3003:3000"
    networks:
      - ades-internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # n8n — automatización de flujos de trabajo
  # FASE 23: alertas académicas, batch boletas, recordatorios documentos
  # UI admin: http://localhost:5678 (solo localhost para configurar flujos)
  # DESACTIVADO: Servidor limitado (2 cores, 12GB). Habilitar con más recursos
  # ---------------------------------------------------------------------------
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: ades-n8n
  #   restart: unless-stopped
  #   environment:
  #     N8N_HOST:                  ${N8N_HOST}
  #     N8N_PORT:                  ${N8N_PORT}
  #     N8N_PROTOCOL:              http
  #     N8N_EDITOR_BASE_URL:       ${N8N_URL}
  #     WEBHOOK_URL:               ${N8N_WEBHOOK_URL}
  #     DB_TYPE:                   postgresdb
  #     DB_POSTGRESDB_HOST:        ades-postgres
  #     DB_POSTGRESDB_DATABASE:    ${N8N_DB}
  #     DB_POSTGRESDB_USER:        ${POSTGRES_USER:-ades_admin}
  #     DB_POSTGRESDB_PASSWORD:    ${POSTGRES_PASSWORD}
  #     N8N_BASIC_AUTH_ACTIVE:     "true"
  #     N8N_BASIC_AUTH_USER:       ${N8N_USER}
  #     N8N_BASIC_AUTH_PASSWORD:   ${N8N_PASSWORD}
  #     N8N_ENCRYPTION_KEY:        ${N8N_ENCRYPTION_KEY}
  #     EXECUTIONS_PROCESS:        main
  #     ADES_API_URL:              http://ades-api:8000
  #     ADES_API_KEY:              ${ADES_INTERNAL_API_KEY}
  #     NTFY_URL:                  http://ades-ntfy:80
  #   volumes:
  #     - n8n-data:/home/node/.n8n
  #   ports:
  #     - "127.0.0.1:5678:5678"
  #   networks:
  #     - ades-internal
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     ntfy:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1024M

  # ---------------------------------------------------------------------------
  # Paperless-ngx — Gestión Documental con OCR (FASE 28)
  # Expedientes digitales del alumno: CURP, actas, certificados previos
  # UI interna en puerto 8010 (accesible vía nginx /docs/)
  # Activado 2026-07-13 — 7.2GB RAM libres de 11GB, límite 1G aquí es seguro.
  # ---------------------------------------------------------------------------
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
    container_name: ades-paperless
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      PAPERLESS_DBENGINE:      postgresql
      PAPERLESS_DBHOST:        ades-postgres
      PAPERLESS_DBPORT:        5432
      PAPERLESS_DBNAME:        paperless
      PAPERLESS_DBUSER:        ${POSTGRES_USER:-ades_admin}
      PAPERLESS_DBPASS:        ${POSTGRES_PASSWORD}
      PAPERLESS_REDIS:         redis://:${VALKEY_PASSWORD}@ades-valkey:6379/1
      PAPERLESS_SECRET_KEY:    ${PAPERLESS_SECRET_KEY:-paperless_dev_secret_change_in_prod}
      PAPERLESS_ALLOWED_HOSTS: "*"
      PAPERLESS_CORS_ALLOWED_HOSTS: "http://localhost:4200,https://ades.setag.mx"
      PAPERLESS_OCR_LANGUAGE:  spa
      PAPERLESS_OCR_LANGUAGES: spa+eng
      PAPERLESS_ADMIN_USER:    ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-paperless_admin_dev}
      PAPERLESS_ADMIN_MAIL:    admin@setag.mx
      PAPERLESS_TIME_ZONE:     America/Mexico_City
      PAPERLESS_URL:           http://ades-paperless:8000
      PAPERLESS_ENABLE_HTTP_REMOTE_USER: "false"
      PAPERLESS_TASK_WORKERS:  1
      PAPERLESS_THREADS_PER_WORKER: 1
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "10", "http://localhost:8000"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # H5P Service — Contenido Educativo Interactivo
  # FASE 25: Editor y player H5P, xAPI tracking, integración con ades_tareas
  # Activado 2026-07-13 — ya usado activamente por backend/app/api/v1/h5p.py.
  # ---------------------------------------------------------------------------
  h5p:
    build:
      context: ./infrastructure/h5p
      dockerfile: Dockerfile
    image: ades-h5p:latest
    container_name: ades-h5p
    restart: unless-stopped
    environment:
      PORT: "8091"
      H5P_DATA_DIR: /data
      ADES_API_URL: http://ades-api:8000
      NODE_ENV: production
    volumes:
      - h5p-data:/data
    ports:
      - "127.0.0.1:8091:8091"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # PgBouncer — connection pooling para PostgreSQL
  # SPRINT 5: Reduce conexiones directas; transaction mode; puerto 6432
  # FastAPI y Spring Boot BFF apuntan aquí en lugar de postgres:5432
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer@sha256:4c1ca296ef525f108f5d3552cc337c0c09587cf8dae7f0067fd93349e47dc1cd
    container_name: ades-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST:            ades-postgres
      DB_PORT:            5432
      DB_NAME:            ades
      DB_USER:            ${POSTGRES_USER:-ades_admin}
      DB_PASSWORD:        ${POSTGRES_PASSWORD}
      POOL_MODE:          transaction
      MAX_CLIENT_CONN:    500
      DEFAULT_POOL_SIZE:  25
      MIN_POOL_SIZE:      5
      RESERVE_POOL_SIZE:  5
      MAX_DB_CONNECTIONS: 80
      AUTH_TYPE:          scram-sha-256
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      ADMIN_USERS:        ${POSTGRES_USER:-ades_admin}
    ports:
      - "127.0.0.1:6432:5432"
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-ades_admin} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M


  # ---------------------------------------------------------------------------
  # postgres_exporter — métricas PostgreSQL para Prometheus
  # SPRINT 5: referenciado en prometheus.yml (job "postgresql") y en las reglas
  # de alerta rules/postgresql.yml desde su creación, pero nunca se definió
  # como servicio real — el target aparecía "down" en silencio. Corregido
  # 2026-07-03. Conecta directo a ades-postgres (no vía PgBouncer) porque
  # pg_stat_activity/pg_stat_user_tables necesitan ver la actividad real del
  # servidor, no solo las conexiones pooleadas.
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
    container_name: ades-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-postgres:5432/ades?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yml
    volumes:
      - ./infrastructure/postgres_exporter/queries.yml:/etc/postgres_exporter/queries.yml:ro
    ports:
      - "127.0.0.1:9187:9187"
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # pgbouncer_exporter — métricas PgBouncer para Prometheus
  # SPRINT 5: pool saturation, wait time, query rates desde SHOW STATS
  # Scrapeado por Prometheus en job "pgbouncer"
  # ---------------------------------------------------------------------------
  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter@sha256:30f31b6c2efdad3647f8182cc7c1a3a19e42bae5d17387694989f969371c230d
    container_name: ades-pgbouncer-exporter
    restart: unless-stopped
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: postgres://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/pgbouncer?sslmode=disable
    ports:
      - "127.0.0.1:9127:9127"
    networks:
      - ades-internal
    depends_on:
      pgbouncer:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy y gateway principal
  # Rutas: /api → ades-api, /auth → authentik, /bi → superset, / → frontend
  # ---------------------------------------------------------------------------
  nginx:
    # Pineado 2026-07-16 (docs/hallazgos/2026-07-16_auditoria_gaps_no_revisados.md
    # #3): era el único servicio del sistema aún en tag flotante — y es el punto de
    # entrada TLS de todo el tráfico. nginx:alpine @ 2026-07-16.
    image: nginx:alpine@sha256:7068961d45b07b2af510ac002e9daa63a1d3eba2111202d6768798690800fffd
    container_name: ades-nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # bind mount — certs en el host
      - certbot-www:/var/www/certbot:ro          # webroot ACME challenge
      - authentik-media:/authentik-media:ro      # archivos media de Authentik (logos, etc.)
      - ./assets:/srv/assets:ro                   # imágenes estáticas de convocatorias y portal
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ades-internal
    depends_on:
      - authentik-server
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Certbot — emisión y renovación automática de certificados Let's Encrypt
  #
  # PRIMER USO (bootstrap TLS):
  #   docker compose run --rm certbot certonly --webroot \
  #     -w /var/www/certbot -d ades.setag.mx \
  #     --email <CERTBOT_EMAIL> --agree-tos --no-eff-email
  #   docker compose restart nginx
  #
  # Renovación: el contenedor verifica cada 12 h y renueva si vence en < 30 días
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot@sha256:6bb19cff0b3972a69855686e0ccbd20b98dbfae2aa43845a5df48947ba1401b4
    container_name: ades-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt  # bind mount — misma ruta que nginx
      - certbot-www:/var/www/certbot       # webroot compartido con nginx
    entrypoint: >
      /bin/sh -c
      'trap exit TERM;
       while :; do
         certbot renew --quiet --webroot -w /var/www/certbot;
         sleep 12h & wait $${!};
       done'
    deploy:
      resources:
        limits:
          memory: 64M

