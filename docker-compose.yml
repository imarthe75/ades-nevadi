# =============================================================================
# ADES — Administración Escolar Instituto Nevadi
# Docker Compose — Infraestructura completa
#
# FASES:
#   FASE 1 (activa):  postgres, valkey, authentik, seaweedfs, ades-api, ades-frontend,
#                     celery-worker, celery-beat, nginx, certbot
#   FASE 3 (activa):  superset (conectado directo a postgres)
#   FASE 4 (comentada): redpanda, debezium, clickhouse, dbt, cube
#
# REDES:
#   ades-internal  — servicios internos ADES (sin exposición directa)
#   aura-network   — red compartida con Aura Intelligence Suite (Superset, ClickHouse)
#
# USO:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   docker compose logs -f ades-api
# =============================================================================

name: ades

networks:
  ades-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  aura-network:
    external: true   # red compartida con superset-stack-docker / Aura Suite
    # Si no existe aún: docker network create aura-network

volumes:
  postgres-data:
  valkey-data:
  seaweedfs-data:
  authentik-media:
  superset-data:
  carbone-templates:  # plantillas DOCX/XLSX para Carbone
  flowise-data:       # flujos, API keys y logs de Flowise
  ntfy-data:          # base de datos SQLite de ntfy (auth, configs)
  ntfy-cache:         # cache de mensajes e historial de ntfy
  prometheus-data:    # métricas históricas de Prometheus
  grafana-data:       # dashboards y configuración de Grafana
  n8n-data:           # workflows y credenciales de n8n
  paperless-data:     # base de datos y configuración de Paperless-ngx
  paperless-media:    # documentos PDF/imagen gestionados por Paperless-ngx
  paperless-export:   # exportaciones y backups de Paperless-ngx
  certbot-certs:   # /etc/letsencrypt — compartido entre certbot y nginx
  certbot-www:     # /var/www/certbot — webroot para ACME challenge
  vault-data:
  vault-init:

# =============================================================================
# SERVICIOS — FASE 1: INFRAESTRUCTURA BASE
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 18 + pgvector
  # Base de datos principal ADES + memoria de largo plazo del agente residente
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg18
    container_name: ades-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ades}
      POSTGRES_USER:     ${POSTGRES_USER:-ades_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      # Base adicional para Authentik
      AUTHENTIK_DB:      ${AUTHENTIK_DB:-authentik}
      AUTHENTIK_DB_USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_DB_PASS: ${AUTHENTIK_DB_PASS:?AUTHENTIK_DB_PASS requerido}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./db/scripts/init_multi_db.sh:/docker-entrypoint-initdb.d/00_init_multi_db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"    # solo localhost — no exponer en producción
    networks:
      - ades-internal
      - aura-network             # accesible desde Aura/ClickHouse/Debezium en Fase 4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ades_admin} -d ${POSTGRES_DB:-ades}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Valkey (Redis compatible) — caché, cola Celery, sesiones, memoria corta agente
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:9.1.0
    container_name: ades-valkey
    restart: unless-stopped
    command: >
      valkey-server
      --save 60 1
      --loglevel notice
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${VALKEY_PASSWORD:?VALKEY_PASSWORD requerido}
    volumes:
      - valkey-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 600M

  # ---------------------------------------------------------------------------
  # SeaweedFS — almacenamiento S3 compatible para archivos, documentos y logos
  # ---------------------------------------------------------------------------
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: ades-seaweedfs
    restart: unless-stopped
    command: server -dir=/data -s3 -s3.port=9000 -filer
    environment:
      WEED_S3_AUTH_ENABLED: "true"
      WEED_S3_ACCESS_KEY:   ${MINIO_ROOT_USER:-ades_minio}
      WEED_S3_SECRET_KEY:   ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD requerido}
    volumes:
      - seaweedfs-data:/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:9000:9000"   # API S3
      - "127.0.0.1:9333:9333"   # Consola/Master
      - "127.0.0.1:8888:8888"   # Filer UI
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Authentik — IdP OIDC/OAuth2
  # Personal docente/admin: Google Workspace SSO
  # Alumnos/Padres: cuentas locales Authentik
  # ---------------------------------------------------------------------------
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: ades-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST:          ades-valkey
      AUTHENTIK_REDIS__PASSWORD:      ${VALKEY_PASSWORD}
      AUTHENTIK_REDIS__DB:            1          # DB 1 para Authentik, DB 0 para ADES
      AUTHENTIK_POSTGRESQL__HOST:     ades-postgres
      AUTHENTIK_POSTGRESQL__USER:     ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME:     ${AUTHENTIK_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASS}
      AUTHENTIK_SECRET_KEY:            ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY requerido}
      AUTHENTIK_BOOTSTRAP_PASSWORD:   ${AUTHENTIK_BOOTSTRAP_PASSWORD:?AUTHENTIK_BOOTSTRAP_PASSWORD requerido}
      AUTHENTIK_BOOTSTRAP_TOKEN:      ${AUTHENTIK_BOOTSTRAP_TOKEN:?AUTHENTIK_BOOTSTRAP_TOKEN requerido}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_LOG_LEVEL:            warning
      # ── Email / SMTP (Zoho Mail) ───────────────────────────────
      # Puerto 465 = SSL directo | Puerto 587 = STARTTLS
      # USE_SSL y USE_TLS son mutuamente excluyentes en Django
      AUTHENTIK_EMAIL__HOST:         ${SMTP_HOST:-smtp.zoho.com}
      AUTHENTIK_EMAIL__PORT:         ${SMTP_PORT:-465}
      AUTHENTIK_EMAIL__USERNAME:     ${SMTP_USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD:     ${SMTP_PASSWORD:-}
      AUTHENTIK_EMAIL__USE_SSL:      ${SMTP_USE_SSL:-true}
      AUTHENTIK_EMAIL__USE_TLS:      ${SMTP_USE_TLS:-false}
      AUTHENTIK_EMAIL__TIMEOUT:      "10"
      AUTHENTIK_EMAIL__FROM:         ${SMTP_FROM:-admin@setag.mx}
    volumes:
      - authentik-media:/media
    ports:
      - "127.0.0.1:9443:9443"   # HTTPS interno
      - "127.0.0.1:9010:9000"   # HTTP interno (detrás de nginx)
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 800M

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: ades-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST:          ades-valkey
      AUTHENTIK_REDIS__PASSWORD:      ${VALKEY_PASSWORD}
      AUTHENTIK_REDIS__DB:            1
      AUTHENTIK_POSTGRESQL__HOST:     ades-postgres
      AUTHENTIK_POSTGRESQL__USER:     ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME:     ${AUTHENTIK_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASS}
      AUTHENTIK_SECRET_KEY:            ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD:   ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN:      ${AUTHENTIK_BOOTSTRAP_TOKEN}
      AUTHENTIK_EMAIL__HOST:         ${SMTP_HOST:-smtp.gmail.com}
      AUTHENTIK_EMAIL__PORT:         ${SMTP_PORT:-587}
      AUTHENTIK_EMAIL__USERNAME:     ${SMTP_USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD:     ${SMTP_PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS:      ${SMTP_USE_TLS:-true}
      AUTHENTIK_EMAIL__TIMEOUT:      "10"
      AUTHENTIK_EMAIL__FROM:         ${SMTP_FROM:-noreply@institutonevadi.edu.mx}
    volumes:
      - authentik-media:/media
      - /var/run/docker.sock:/var/run/docker.sock          # para blueprints
      - ./infrastructure/authentik:/blueprints/custom:ro  # OIDC apps ADES
    networks:
      - ades-internal
    depends_on:
      - authentik-server
    deploy:
      resources:
        limits:
          memory: 600M

  # ---------------------------------------------------------------------------
  # HashiCorp Vault — Gestión de Secretos y Credenciales
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    container_name: ades-vault
    restart: unless-stopped
    environment:
      SKIP_SETCAP: "true"
      SKIP_CHOWN: "true"
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./infrastructure/vault/config:/vault/config:ro
      - vault-init:/vault/init
    command: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    user: root
    networks:
      - ades-internal

  vault-init:
    image: hashicorp/vault:latest
    container_name: ades-vault-init
    depends_on:
      - vault
    volumes:
      - vault-init:/vault/init
      - ./infrastructure/vault/scripts:/vault/scripts:ro
    entrypoint: /vault/scripts/vault-init.sh
    user: root
    networks:
      - ades-internal

  # ---------------------------------------------------------------------------
  # ADES API — FastAPI backend principal
  # ---------------------------------------------------------------------------
  ades-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-api
    restart: unless-stopped
    environment:
      # Authentik OIDC
      OIDC_ISSUER:         ${OIDC_ISSUER:-https://auth.ades.setag.mx/application/o/ades-frontend/}
      OIDC_CLIENT_ID:      ${OIDC_CLIENT_ID:-ades-frontend}
      # API Config
      ENVIRONMENT:         ${ENVIRONMENT:-development}
      LOG_LEVEL:           ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-http://localhost:4200,https://escolar.institutonevadi.edu.mx}
      BASE_URL:            ${BASE_URL:-https://ades.setag.mx}
      VAULT_ADDR:          http://ades-vault:8200
      MINIO_SECURE:        "false"
      # PgBouncer — asyncpg deshabilita prepared statements vía connect_args en database.py
      # Puerto 5432 = puerto interno del contenedor pgbouncer (el 6432 es solo el mapeo del host)
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/ades
    volumes:
      - ./backend:/app:cached     # hot-reload en desarrollo
      - vault-init:/vault/init:ro
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - ades-internal
    depends_on:
      pgbouncer:
        condition: service_healthy
      valkey:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # ADES BFF — Spring Boot backend
  # ---------------------------------------------------------------------------
  ades-bff:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: ades-bff
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://authentik-server:9000/application/o/ades-frontend/jwks/
      VAULT_ADDR:                  http://ades-vault:8200
      SPRING_DATASOURCE_URL:       jdbc:postgresql://ades-postgres:5432/ades
      SPRING_DATASOURCE_USERNAME:  ${POSTGRES_USER:-ades_admin}
      SPRING_DATASOURCE_PASSWORD:  ${POSTGRES_PASSWORD}
    volumes:
      - vault-init:/vault/init:ro
      - ./assets:/srv/assets          # imágenes públicas de convocatorias (rw para uploads)
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - ades-internal
    depends_on:
      pgbouncer:
        condition: service_healthy
      valkey:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Celery Worker — tareas asíncronas
  # Generación automática de tareas al cargar plan de estudios,
  # notificaciones, reportes batch, procesamiento de archivos
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-celery-worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      VAULT_ADDR:          http://ades-vault:8200
      ENVIRONMENT:         ${ENVIRONMENT:-development}
      BASE_URL:            ${BASE_URL:-https://ades.setag.mx}
      MINIO_SECURE:        "false"
    volumes:
      - ./backend:/app:cached
      - vault-init:/vault/init:ro
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # Celery Beat — tareas programadas (alertas nocturnas, refresco BI)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-celery-beat
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      VAULT_ADDR:          http://ades-vault:8200
      ENVIRONMENT:         ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app:cached
      - vault-init:/vault/init:ro
    networks:
      - ades-internal
    depends_on:
      - celery-worker
    deploy:
      resources:
        limits:
          memory: 256M

  # Celery Flower — Monitoreo visual de tareas Celery
  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ades-celery-flower
    restart: unless-stopped
    command: celery -A app.worker.celery_app flower --port=5555 --url-prefix=flower
    environment:
      VAULT_ADDR:          http://ades-vault:8200
      ENVIRONMENT:         ${ENVIRONMENT:-development}
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - ./backend:/app:cached
      - vault-init:/vault/init:ro
    networks:
      - ades-internal
    depends_on:
      - celery-worker
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ADES Frontend — Angular + PrimeNG
  # En desarrollo sirve con ng serve; en producción build estático vía nginx
  # ---------------------------------------------------------------------------
  ades-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
    container_name: ades-frontend
    restart: unless-stopped
    environment:
      API_URL:      http://ades-api:8000
      OIDC_ISSUER:  ${OIDC_ISSUER}
    ports:
      - "127.0.0.1:4200:80"     # producción: nginx estático en 80 / dev: ng serve en 4200
    networks:
      - ades-internal
    depends_on:
      - ades-api

  # ---------------------------------------------------------------------------
  # Portal Público de Convocatorias — portalnvd.setag.mx
  # Angular 22 SPA servida por nginx estático
  # ---------------------------------------------------------------------------
  ades-portal:
    build:
      context: ./frontend-portal
      dockerfile: Dockerfile
      target: ${PORTAL_BUILD_TARGET:-production}
    container_name: ades-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:4201:80"
    networks:
      - ades-internal
    depends_on:
      - ades-bff

  # ---------------------------------------------------------------------------
  # Apache Superset 6.1.0 — BI y dashboards
  # Conectado a PostgreSQL ADES directamente en Fase 1-3
  # En Fase 4 se conecta a ClickHouse vía Cube.js
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: ./integrations/superset
      dockerfile: Dockerfile
    container_name: ades-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY:         ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY requerido}
      SUPERSET_DATABASE_URI:       postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ades-postgres:5432/superset
      REDIS_URL:                   redis://:${VALKEY_PASSWORD}@ades-valkey:6379/2
      # OIDC con Authentik (mismo IdP que el resto del sistema)
      OIDC_CLIENT_ID:              ${SUPERSET_OIDC_CLIENT_ID:-superset}
      OIDC_CLIENT_SECRET:          ${SUPERSET_OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER:                 ${SUPERSET_OIDC_ISSUER:-https://auth.ades.setag.mx/application/o/superset/}
      OIDC_DISCOVERY_URL:          ${OIDC_DISCOVERY_URL:-https://auth.ades.setag.mx/application/o/superset/.well-known/openid-configuration}
      OIDC_SCOPES:                 ${OIDC_SCOPES:-openid email profile}
      # Contraseña del usuario superset_ro (solo lectura a ades_bi)
      SUPERSET_RO_PASSWORD:        ${SUPERSET_RO_PASSWORD:-superset_ro_changeme}
    volumes:
      - superset-data:/app/superset_home
    ports:
      - "127.0.0.1:8088:8088"
    networks:
      - ades-internal
      - aura-network             # comparte red con Aura para Fase 4 con ClickHouse
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1.5G

  # ---------------------------------------------------------------------------
  # Carbone — generador de reportes PDF/DOCX a partir de plantillas Word/Excel
  # FASE 18: Boletas, constancias, kardex, reportes de conducta
  # API interna: POST /render/:templateId  POST /templates
  # ---------------------------------------------------------------------------
  carbone:
    build:
      context: ./integrations/carbone
      dockerfile: Dockerfile
    container_name: ades-carbone
    restart: unless-stopped
    environment:
      PORT:          3000
      TEMPLATES_DIR: /app/templates
    volumes:
      - carbone-templates:/app/templates
    ports:
      - "127.0.0.1:3001:3000"   # solo localhost — no exponer directamente
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G            # LibreOffice necesita RAM para conversión PDF

  # ---------------------------------------------------------------------------
  # Flowise — constructor visual de flujos de IA (chatbots, agentes, RAG)
  # FASE 17: Chatbot pedagógico + NL→SQL sobre ades_*
  # UI admin: http://localhost:3002 (acceso local solo para configurar flujos)
  # ---------------------------------------------------------------------------
  flowise:
    image: flowiseai/flowise:latest
    container_name: ades-flowise
    restart: unless-stopped
    environment:
      PORT:                  3000
      FLOWISE_USERNAME:      ${FLOWISE_USERNAME:-admin}
      FLOWISE_PASSWORD:      ${FLOWISE_PASSWORD:-cambia_esto_en_produccion}
      FLOWISE_SECRETKEY_OVERWRITE: ${FLOWISE_SECRET_KEY:-}
      DATABASE_PATH:         /root/.flowise
      APIKEY_PATH:           /root/.flowise
      LOG_PATH:              /root/.flowise/logs
      # Integración con base de datos PostgreSQL ADES (para Vanna AI / herramientas SQL)
      OVERRIDE_DATABASE:     true
    volumes:
      - flowise-data:/root/.flowise
    ports:
      - "127.0.0.1:3002:3000"  # UI de configuración — solo localhost
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # ntfy — push notifications sin Firebase
  # FASE 20: alertas académicas en tiempo real a padres, docentes y alumnos
  # Topics: ades_{usuario_id}  Canal de suscripción por usuario
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ades-ntfy
    restart: unless-stopped
    command: serve --base-url http://ades-ntfy:80 --behind-proxy
    environment:
      TZ: America/Mexico_City
      NTFY_BASE_URL:          ${NTFY_BASE_URL:-http://notify.ades.setag.mx}
      NTFY_CACHE_FILE:        /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE:         /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: read-only
      NTFY_BEHIND_PROXY:      "true"
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ntfy-cache:/var/cache/ntfy
    ports:
      - "127.0.0.1:2586:80"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Stirling-PDF — procesamiento de PDF (merge, OCR, watermark, compress)
  # FASE 21: complemento de Carbone para boletas grupales y expedientes
  # ---------------------------------------------------------------------------
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: ades-stirling-pdf
    restart: unless-stopped
    environment:
      DOCKER_ENABLE_SECURITY:      "false"
      LANGS:                       "es_MX"
      SYSTEM_DEFAULTLOCALE:        es-MX
      SYSTEM_GOOGLEVISIBILITY:     "false"
      UI_APPNAME:                  "ADES PDF"
      UI_HOMEDESCRIPTION:          "Procesamiento PDF — Instituto Nevadi"
      JAVA_TOOL_OPTIONS: >-
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:G1HeapRegionSize=4m
        -XX:G1PeriodicGCInterval=60000
        -XX:+UseStringDeduplication
        -XX:+ExplicitGCInvokesConcurrent
        -Dspring.threads.virtual.enabled=true
        -Djava.awt.headless=true
        -XX:InitialRAMPercentage=25
        -XX:MaxRAMPercentage=65
        -XX:MaxMetaspaceSize=256m
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1.5G

  # ---------------------------------------------------------------------------
  # Prometheus — recolección de métricas
  # FASE 22: scrape FastAPI /metrics, node-exporter, postgres-exporter
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ades-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Grafana — dashboards de monitoreo y BI operativo
  # FASE 22: latencia API, uptime servicios, alertas operacionales
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: ades-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL:                ${GRAFANA_URL:-http://monitor.ades.setag.mx}
      GF_SECURITY_ADMIN_USER:           ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:       ${GRAFANA_ADMIN_PASSWORD:-cambia_esto_en_produccion}
      GF_USERS_ALLOW_SIGN_UP:           "false"
      GF_AUTH_ANONYMOUS_ENABLED:        "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:       "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING:      "true"
      GF_INSTALL_PLUGINS:               "grafana-piechart-panel"
      GF_PATHS_PROVISIONING:            /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3003:3000"
    networks:
      - ades-internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M

  # ---------------------------------------------------------------------------
  # n8n — automatización de flujos de trabajo
  # FASE 23: alertas académicas, batch boletas, recordatorios documentos
  # UI admin: http://localhost:5678 (solo localhost para configurar flujos)
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: ades-n8n
    restart: unless-stopped
    environment:
      N8N_HOST:                  ${N8N_HOST:-0.0.0.0}
      N8N_PORT:                  5678
      N8N_PROTOCOL:              http
      N8N_EDITOR_BASE_URL:       ${N8N_URL:-http://localhost:5678}
      WEBHOOK_URL:               ${N8N_WEBHOOK_URL:-http://ades-n8n:5678}
      DB_TYPE:                   postgresdb
      DB_POSTGRESDB_HOST:        ades-postgres
      DB_POSTGRESDB_DATABASE:    ${N8N_DB:-n8n}
      DB_POSTGRESDB_USER:        ${POSTGRES_USER:-ades_admin}
      DB_POSTGRESDB_PASSWORD:    ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE:     "true"
      N8N_BASIC_AUTH_USER:       ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:   ${N8N_PASSWORD:-cambia_esto_en_produccion}
      N8N_ENCRYPTION_KEY:        ${N8N_ENCRYPTION_KEY:-cambia_esto_en_produccion}
      EXECUTIONS_PROCESS:        main
      # Acceso al backend ADES para webhooks
      ADES_API_URL:              http://ades-api:8000
      ADES_API_KEY:              ${ADES_INTERNAL_API_KEY:-}
      # Acceso a ntfy para notificaciones
      NTFY_URL:                  http://ades-ntfy:80
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
      ntfy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Paperless-ngx — Gestión Documental con OCR (FASE 28)
  # Expedientes digitales del alumno: CURP, actas, certificados previos
  # UI interna en puerto 8010 (accesible vía nginx /docs/)
  # Reutiliza: ades-postgres (DB paperless) + ades-valkey (broker DB 1)
  # ---------------------------------------------------------------------------
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: ades-paperless
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      # Base de datos — usa el PostgreSQL existente de ADES
      PAPERLESS_DBENGINE:      postgresql
      PAPERLESS_DBHOST:        ades-postgres
      PAPERLESS_DBPORT:        5432
      PAPERLESS_DBNAME:        paperless
      PAPERLESS_DBUSER:        ${POSTGRES_USER:-ades_admin}
      PAPERLESS_DBPASS:        ${POSTGRES_PASSWORD}
      # Broker de tareas — reutiliza Valkey con DB separada (db=1) + auth
      PAPERLESS_REDIS:         redis://:${VALKEY_PASSWORD}@ades-valkey:6379/1
      # Seguridad
      PAPERLESS_SECRET_KEY:    ${PAPERLESS_SECRET_KEY:-paperless_dev_secret_change_in_prod}
      PAPERLESS_ALLOWED_HOSTS: "*"
      PAPERLESS_CORS_ALLOWED_HOSTS: "http://localhost:4200,https://ades.setag.mx"
      # OCR — tesseract con español como idioma primario
      PAPERLESS_OCR_LANGUAGE:  spa
      PAPERLESS_OCR_LANGUAGES: spa+eng
      # Configuración de usuario admin inicial
      PAPERLESS_ADMIN_USER:    ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-paperless_admin_dev}
      PAPERLESS_ADMIN_MAIL:    admin@setag.mx
      # Configuración de la aplicación
      PAPERLESS_TIME_ZONE:     America/Mexico_City
      PAPERLESS_URL:           http://ades-paperless:8000
      PAPERLESS_ENABLE_HTTP_REMOTE_USER: "false"
      # Rendimiento
      PAPERLESS_TASK_WORKERS:  1
      PAPERLESS_THREADS_PER_WORKER: 1
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
    networks:
      - ades-internal
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "10", "http://localhost:8000"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # PgBouncer — connection pooling para PostgreSQL
  # SPRINT 5: Reduce conexiones directas; transaction mode; puerto 6432
  # FastAPI y Spring Boot BFF apuntan aquí en lugar de postgres:5432
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ades-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST:            ades-postgres
      DB_PORT:            5432
      DB_NAME:            ades
      DB_USER:            ${POSTGRES_USER:-ades_admin}
      DB_PASSWORD:        ${POSTGRES_PASSWORD}
      POOL_MODE:          transaction
      MAX_CLIENT_CONN:    500
      DEFAULT_POOL_SIZE:  25
      MIN_POOL_SIZE:      5
      RESERVE_POOL_SIZE:  5
      MAX_DB_CONNECTIONS: 80
      AUTH_TYPE:          scram-sha-256
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      ADMIN_USERS:        ${POSTGRES_USER:-ades_admin}
    ports:
      - "127.0.0.1:6432:5432"
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-ades_admin} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # postgres_exporter — métricas PostgreSQL para Prometheus
  # SPRINT 5: expone pg_stat_*, conexiones, tamaño tablas, bloat
  # Scrapeado por Prometheus en job "postgresql"
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: ades-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-postgres:5432/ades?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yml
    volumes:
      - ./infrastructure/postgres_exporter/queries.yml:/etc/postgres_exporter/queries.yml:ro
    ports:
      - "127.0.0.1:9187:9187"
    networks:
      - ades-internal
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # pgbouncer_exporter — métricas PgBouncer para Prometheus
  # SPRINT 5: pool saturation, wait time, query rates desde SHOW STATS
  # Scrapeado por Prometheus en job "pgbouncer"
  # ---------------------------------------------------------------------------
  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:latest
    container_name: ades-pgbouncer-exporter
    restart: unless-stopped
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: postgres://${POSTGRES_USER:-ades_admin}:${POSTGRES_PASSWORD}@ades-pgbouncer:5432/pgbouncer?sslmode=disable
    ports:
      - "127.0.0.1:9127:9127"
    networks:
      - ades-internal
    depends_on:
      pgbouncer:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy y gateway principal
  # Rutas: /api → ades-api, /auth → authentik, /bi → superset, / → frontend
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ades-nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # bind mount — certs en el host
      - certbot-www:/var/www/certbot:ro          # webroot ACME challenge
      - authentik-media:/authentik-media:ro      # archivos media de Authentik (logos, etc.)
      - ./assets:/srv/assets:ro                   # imágenes estáticas de convocatorias y portal
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ades-internal
    depends_on:
      - authentik-server
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Certbot — emisión y renovación automática de certificados Let's Encrypt
  #
  # PRIMER USO (bootstrap TLS):
  #   docker compose run --rm certbot certonly --webroot \
  #     -w /var/www/certbot -d ades.setag.mx \
  #     --email <CERTBOT_EMAIL> --agree-tos --no-eff-email
  #   docker compose restart nginx
  #
  # Renovación: el contenedor verifica cada 12 h y renueva si vence en < 30 días
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: ades-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt  # bind mount — misma ruta que nginx
      - certbot-www:/var/www/certbot       # webroot compartido con nginx
    entrypoint: >
      /bin/sh -c
      'trap exit TERM;
       while :; do
         certbot renew --quiet --webroot -w /var/www/certbot;
         sleep 12h & wait $${!};
       done'
    deploy:
      resources:
        limits:
          memory: 64M

