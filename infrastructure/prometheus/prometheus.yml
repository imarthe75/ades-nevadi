# Prometheus — ADES Instituto Nevadi
# Recolección de métricas: FastAPI, PostgreSQL, contenedores Docker
# Retención: 30 días (ver docker-compose)

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ades-monitor'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Sin alertmanager externo en esta fase

rule_files: []

scrape_configs:

  # ── FastAPI ADES ──────────────────────────────────────────────────────────
  - job_name: 'ades-api'
    static_configs:
      - targets: ['ades-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Carbone ───────────────────────────────────────────────────────────────
  - job_name: 'ades-carbone'
    static_configs:
      - targets: ['ades-carbone:3000']
    metrics_path: '/health'
    scrape_interval: 60s

  # ── Flowise ───────────────────────────────────────────────────────────────
  - job_name: 'ades-flowise'
    static_configs:
      - targets: ['ades-flowise:3000']
    metrics_path: '/api/v1/version'
    scrape_interval: 60s
