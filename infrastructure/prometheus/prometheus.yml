# Prometheus — ADES Instituto Nevadi
# SPRINT 5: postgres_exporter + pgbouncer + alerting rules
# Retención: 30 días

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ades-monitor'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # Grafana Alerting cubre este rol en ADES (sin alertmanager separado)

rule_files:
  - "rules/postgresql.yml"

scrape_configs:

  # ── FastAPI ADES ──────────────────────────────────────────────────────
  - job_name: 'ades-api'
    static_configs:
      - targets: ['ades-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ── Prometheus self-monitoring ────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── PostgreSQL via postgres_exporter ─────────────────────────────────
  - job_name: 'postgresql'
    static_configs:
      - targets: ['ades-postgres-exporter:9187']
    scrape_interval: 30s

  # ── PgBouncer via postgres_exporter (stats DB) ────────────────────────
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['ades-pgbouncer-exporter:9127']
    scrape_interval: 30s

  # ── Spring Boot BFF (Actuator Prometheus endpoint) ────────────────────
  - job_name: 'ades-bff'
    static_configs:
      - targets: ['ades-bff:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s

  # ── Carbone ───────────────────────────────────────────────────────────
  - job_name: 'ades-carbone'
    static_configs:
      - targets: ['ades-carbone:3000']
    metrics_path: '/health'
    scrape_interval: 60s
