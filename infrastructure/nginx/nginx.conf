events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Mapa WebSocket (Angular HMR / live-reload)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTP — ACME challenge (certbot webroot) + redirect → HTTPS
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name ades.setag.mx 129.213.35.140;

        # Certbot webroot: nginx sirve el challenge, certbot escribe aquí
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — aplicación completa con TLS
    #
    # PRIMER USO (bootstrap TLS):
    #   1. Levantar solo nginx en modo HTTP (comentar este bloque server 443)
    #      docker compose up -d nginx
    #   2. Emitir certificado:
    #      docker compose run --rm certbot certonly --webroot \
    #        -w /var/www/certbot -d ades.setag.mx \
    #        --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email
    #   3. Descomentar este bloque y recargar:
    #      docker compose restart nginx
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        # Frontend Angular (WebSocket para ng serve / HMR)
        location / {
            proxy_pass http://ades-frontend:4200;
            proxy_set_header Host              $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API FastAPI
        location /api/ {
            proxy_pass http://ades-api:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentik IdP
        location /auth/ {
            proxy_pass http://ades-authentik-server:9000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 16k;
        }

        # Superset BI
        location /bi/ {
            proxy_pass http://ades-superset:8088/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MinIO consola (solo desarrollo)
        location /minio/ {
            proxy_pass http://ades-minio:9001/;
            proxy_set_header Host $host;
        }
    }
}
