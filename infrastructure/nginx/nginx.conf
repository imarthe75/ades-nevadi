events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # Mapa WebSocket (Angular HMR / live-reload)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTP — ACME challenge + redirect → HTTPS (todos los dominios)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name ades.setag.mx auth.ades.setag.mx 129.213.35.140;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — auth.ades.setag.mx → Authentik (raíz limpia)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name auth.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/auth.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        location / {
            proxy_pass http://ades-authentik-server:9000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — bi.ades.setag.mx → Apache Superset
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name bi.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/bi.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bi.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        location / {
            proxy_pass http://ades-superset:8088;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffer_size   32k;
            proxy_buffers       8 32k;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — minio.ades.setag.mx → MinIO consola admin
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name minio.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/minio.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minio.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        location / {
            proxy_pass http://ades-minio:9001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — ades.setag.mx → aplicación ADES
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        # API FastAPI — activa desde FASE 1
        location /api/ {
            proxy_pass http://ades-api:8000/api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Frontend Angular
        location / {
            proxy_pass http://ades-frontend:4200;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 120s;
        }
    }
}
