events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # Docker internal DNS — deferred upstream resolution (resilient to restart order)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Mapa WebSocket (Angular HMR / live-reload)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTP — ACME challenge + redirect → HTTPS (todos los dominios)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name ades.setag.mx auth.ades.setag.mx notify.ades.setag.mx monitor.ades.setag.mx 129.213.35.140;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — auth.ades.setag.mx → Authentik (raíz limpia)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name auth.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/auth.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        # Media files de Authentik (logos, favicons de branding) servidos directo
        location /media/ {
            alias /authentik-media/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            set $authentik http://ades-authentik-server:9000;
            proxy_pass $authentik;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — bi.ades.setag.mx → Apache Superset
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name bi.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/bi.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bi.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        location / {
            set $superset http://ades-superset:8088;
            proxy_pass $superset;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffer_size   32k;
            proxy_buffers       8 32k;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — minio.ades.setag.mx → MinIO consola admin
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name minio.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/minio.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minio.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        location / {
            set $minio http://ades-minio:9001;
            proxy_pass $minio;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — ades.setag.mx → aplicación ADES
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        # API FastAPI
        location /api/ {
            set $api http://ades-api:8000;
            proxy_pass $api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Frontend Angular (nginx static prod)
        location / {
            set $frontend http://ades-frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 120s;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — notify.ades.setag.mx → ntfy push notifications
    # FASE 20: acceso público para app móvil y SSE desde browser
    # Certificado requerido:
    #   certbot certonly --webroot -w /var/www/certbot \
    #     -d notify.ades.setag.mx --email admin@setag.mx --agree-tos
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name notify.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/notify.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/notify.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # SSE requiere buffering desactivado y timeouts largos
        proxy_buffering     off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;

        location / {
            set $ntfy http://ades-ntfy:80;
            proxy_pass $ntfy;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — monitor.ades.setag.mx → Grafana (solo admin, acceso VPN/IP)
    # FASE 22: dashboards de monitoreo del sistema
    # Restringir por IP si se expone: allow 10.0.0.0/8; deny all;
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name monitor.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/monitor.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/monitor.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Descomenta para restringir acceso por IP:
        # allow 187.246.25.0/24;  # IP del Instituto
        # deny all;

        location / {
            set $grafana http://ades-grafana:3000;
            proxy_pass $grafana;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
