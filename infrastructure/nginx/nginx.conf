events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # ──────────────────────────────────────────────────────────────────
    # Compression — GZIP (soporte universal)
    # ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/json
        application/javascript
        application/xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ──────────────────────────────────────────────────────────────────
    # Compression — Brotli deshabilitado: imagen nginx:alpine no incluye
    # el módulo brotli (ngx_brotli). Requiere imagen custom compilada con
    # el módulo para reactivar. GZIP arriba cubre compresión universal.
    # ──────────────────────────────────────────────────────────────────

    # Docker internal DNS — deferred upstream resolution (resilient to restart order)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # WebP content negotiation: sirve la variante .webp junto al original si el
    # navegador lo soporta y el archivo existe (Punto 15 — reduce peso de imágenes
    # institucionales sin recodificar en cada request). Convención de nombre esperada:
    # "logo.png" original → "logo.png.webp" generado aparte (p.ej. cwebp -q 80),
    # ambos en la misma carpeta que el original.
    map $http_accept $webp_suffix {
        default   "";
        "~*webp"  ".webp";
    }

    # Mapa WebSocket (Angular HMR / live-reload)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTP — ACME challenge + redirect → HTTPS (todos los dominios)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name ades.setag.mx auth.ades.setag.mx notify.ades.setag.mx monitor.ades.setag.mx portalnvd.setag.mx 163.192.138.130;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — auth.ades.setag.mx → Authentik (raíz limpia)
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name auth.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/auth.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://ades.setag.mx; connect-src 'self'; frame-src 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Media files de Authentik (logos, favicons de branding) servidos directo
        location /media/ {
            alias /authentik-media/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            set $authentik http://ades-authentik-server:9000;
            proxy_pass $authentik;
            proxy_hide_header Content-Security-Policy;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_buffer_size   16k;
            proxy_buffers       4 16k;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — bi.ades.setag.mx → Apache Superset
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name bi.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/bi.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bi.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        # X-Frame-Options omitido a propósito: Superset se embebe vía iframe desde
        # ades.setag.mx (dashboards BI), config en superset_config.py con
        # TALISMAN_ENABLED=False + HTTP_HEADERS={"X-Frame-Options":"ALLOWALL"}.
        # Agregar SAMEORIGIN aquí duplicaría/entraría en conflicto con ese header y
        # rompería el embed.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; frame-ancestors 'self' https://ades.setag.mx;" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            set $superset http://ades-superset:8088;
            proxy_pass $superset;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_buffer_size   32k;
            proxy_buffers       8 32k;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — minio.ades.setag.mx → SeaweedFS Filer/Console UI
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name minio.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/minio.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/minio.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            set $seaweedfs http://ades-seaweedfs:8888;
            proxy_pass $seaweedfs;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — ades.setag.mx → aplicación ADES
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 50M;

        # Seguridad (hallazgo auditoría 2026-07-06 — headers ausentes en todo el sitio)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP (2026-07-06) — probada en modo Report-Only contra 15 pantallas reales en
        # producción (Playwright); ajustada a las 2 violaciones reales encontradas
        # (evento inline + SSE de notify.ades.setag.mx) y luego promovida a forzada.
        # frame-src ampliado (2026-07-17): el módulo BI (frontend/src/app/features/bi)
        # embebe el dashboard de Superset en un <iframe src="https://bi.ades.setag.mx/...">
        # (embedUrl construido en SupersetController con superset.public-url). Con solo
        # 'self' el navegador bloqueaba el iframe por CSP aunque la URL ya apuntaba
        # correctamente al host público (nginx ya proxea bi.ades.setag.mx → ades-superset,
        # con frame-ancestors 'self' https://ades.setag.mx del lado de Superset) — el embed
        # nunca cargaba en producción pese a que la URL era alcanzable.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://notify.ades.setag.mx wss://notify.ades.setag.mx; frame-src 'self' https://bi.ades.setag.mx; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Archivos estáticos de convocatorias e imágenes institucionales.
        # Sirve la variante .webp si el navegador la soporta (Accept: image/webp) y
        # existe junto al original; si no, cae al archivo pedido.
        location /assets/ {
            alias /srv/assets/;
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri$webp_suffix $uri =404;
        }

        # H5P Service — player HTML + assets (core JS, libraries, editor)
        # FASE 25: el iframe del player carga JS desde /h5p/core/, /h5p/libraries/, etc.
        location /h5p/ {
            set $h5p http://ades-h5p:8091;
            proxy_pass $h5p;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 100M;
        }

        # API FastAPI (Permanent microservices)
        location ~ ^/api/v1/(ai|ia-avanzada|chatbot|carbone|pdf|webhooks|automations|push|expediente|certificados|h5p|bbb)(/|$) {
            set $api http://ades-api:8000;
            proxy_pass $api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 100M;
        }

        # API Spring Boot BFF (Main application backend)
        location /api/ {
            set $bff http://ades-bff:8080;
            proxy_pass $bff;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Frontend Angular (nginx static prod)
        location / {
            set $frontend http://ades-frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 120s;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — notify.ades.setag.mx → ntfy push notifications
    # FASE 20: acceso público para app móvil y SSE desde browser
    # Certificado requerido:
    #   certbot certonly --webroot -w /var/www/certbot \
    #     -d notify.ades.setag.mx --email admin@setag.mx --agree-tos
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name notify.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/notify.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/notify.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # SSE requiere buffering desactivado y timeouts largos
        proxy_buffering     off;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            set $ntfy http://ades-ntfy:80;
            proxy_pass $ntfy;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — monitor.ades.setag.mx → Grafana y Celery Flower
    # FASE 22: dashboards de monitoreo del sistema y Flower
    # ⚠️ Hallazgo crítico corregido 2026-07-16 (docs/hallazgos/
    # 2026-07-16_auditoria_gaps_no_revisados.md #3): el comentario original decía
    # "solo admin, acceso VPN/IP" pero no existía ninguna directiva allow/deny ni
    # auth_basic en location / — Grafana quedaba accesible sin credenciales a
    # cualquiera que resolviera el subdominio (GF_AUTH_ANONYMOUS_ENABLED=true sin
    # nada delante). Ahora ambas rutas comparten el mismo .htpasswd que ya
    # protegía /flower/. La contrapartida: el iframe de monitor.component.ts
    # (Angular) ya no carga en silencio — el navegador muestra el prompt nativo
    # de Basic Auth dentro del iframe la primera vez por sesión. Es una
    # degradación de UX aceptada a cambio de cerrar el hueco; la solución
    # definitiva (login único vía Authentik, que ya es el IdP de todo el resto
    # del sistema y Grafana soporta OAuth genérico) queda como mejora futura,
    # fuera del alcance de este fix puntual.
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name monitor.ades.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/monitor.ades.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/monitor.ades.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # X-Frame-Options omitido a propósito: Grafana se embebe vía <iframe> desde
        # monitor.component.ts (ades.setag.mx). SAMEORIGIN aquí rompería ese embed
        # cross-subdominio.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; frame-ancestors 'self' https://ades.setag.mx;" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location /flower/ {
            auth_basic           "Celery Flower Telemetry";
            auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

            set $flower http://ades-celery-flower:5555;
            proxy_pass $flower;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        location / {
            auth_basic           "ADES Monitoring";
            auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

            set $grafana http://ades-grafana:3000;
            proxy_pass $grafana;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS — portalnvd.setag.mx → Portal Público de Convocatorias
    # Activar después de: certbot certonly --webroot -w /var/www/certbot -d portalnvd.setag.mx
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name portalnvd.setag.mx;

        ssl_certificate     /etc/letsencrypt/live/portalnvd.setag.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/portalnvd.setag.mx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://ades.setag.mx;" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Angular SPA — frontend portal
        location / {
            set $portal http://ades-portal:80;
            proxy_pass $portal;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # Archivos estáticos de convocatorias (flyers, imágenes institucionales)
        location /assets/ {
            alias /srv/assets/;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri$webp_suffix $uri =404;
        }

        # API portal — proxy al BFF (mismo backend que ades.setag.mx)
        location /api/portal/ {
            set $bff http://ades-bff:8080;
            proxy_pass $bff;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            client_max_body_size 15M;
        }
    }
}
