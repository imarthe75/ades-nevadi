[databases]
; Base de datos ADES — apunta al PostgreSQL real en la red interna Docker
ades       = host=ades-postgres port=5432 dbname=ades
authentik  = host=ades-postgres port=5432 dbname=authentik
superset   = host=ades-postgres port=5432 dbname=superset
paperless  = host=ades-postgres port=5432 dbname=paperless
n8n        = host=ades-postgres port=5432 dbname=n8n

[pgbouncer]
; ── Modo pool ─────────────────────────────────────────────────────────────
; transaction: reutiliza la conexión por transacción (máximo ahorro)
; Requiere: asyncpg statement_cache_size=0, JDBC prepareThreshold=0
pool_mode = transaction

; ── Pool sizing ──────────────────────────────────────────────────────────
; max_client_conn: máximo de conexiones de clientes (apps → PgBouncer)
max_client_conn       = 500
; default_pool_size: conexiones PgBouncer → PostgreSQL por database/user
default_pool_size     = 25
min_pool_size         = 5
reserve_pool_size     = 5
reserve_pool_timeout  = 3

; ── Límites globales ──────────────────────────────────────────────────────
max_db_connections    = 80   ; techo global de conexiones a PostgreSQL
max_user_connections  = 80

; ── Timeouts ──────────────────────────────────────────────────────────────
server_idle_timeout   = 600   ; cierra conexiones idle > 10 min
server_lifetime       = 3600  ; rota conexiones cada 1 hora
server_connect_timeout = 15
client_idle_timeout   = 300   ; desconecta clientes idle > 5 min
query_timeout         = 0     ; sin timeout de query (manejado por app)
query_wait_timeout    = 30    ; error si espera > 30s en pool saturado

; ── Auth ──────────────────────────────────────────────────────────────────
auth_type   = md5
auth_file   = /etc/pgbouncer/userlist.txt

; ── Red ───────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

; ── Admin ─────────────────────────────────────────────────────────────────
admin_users  = ades_admin
stats_users  = ades_admin

; ── Logging ───────────────────────────────────────────────────────────────
log_connections    = 0
log_disconnections = 0
log_pooler_errors  = 1

; ── Comportamiento ────────────────────────────────────────────────────────
; En transaction mode, DISCARD ALL limpia SET/session vars entre clientes
server_reset_query     = DISCARD ALL
server_reset_query_always = 0

ignore_startup_parameters = extra_float_digits,search_path
