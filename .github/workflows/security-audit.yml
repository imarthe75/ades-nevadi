name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday 3 AM UTC

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install security tools
        run: |
          pip install -q bandit safety
          cd frontend && npm install

      - name: Bandit (Python)
        run: |
          python -m bandit -r backend/app -f json -o /tmp/bandit.json || true
          python << 'EOF'
          import json
          with open('/tmp/bandit.json') as f:
            data = json.load(f)
          findings = data.get('results', [])
          critical = [r for r in findings if r.get('severity') == 'HIGH']
          if critical:
            print(f"::error::{len(critical)} HIGH severity findings:")
            for r in critical[:3]:
              print(f"  {r['test_id']}: {r['issue_text'][:100]}")
          else:
            print("✅ No HIGH severity findings")
          EOF

      - name: Safety (Python dependencies)
        run: |
          cd backend && safety check --json > /tmp/safety.json || true
          python << 'EOF'
          import json
          try:
            with open('/tmp/safety.json') as f:
              data = json.load(f)
            vulnerable = len(data.get('scanned_packages', {}))
            print(f"⚠️  Vulnerable packages: {vulnerable}")
          except:
            print("✅ No vulnerable dependencies detected")
          EOF
        continue-on-error: true

      - name: ESLint (Frontend)
        run: |
          cd frontend
          npm run lint 2>&1 | tee /tmp/eslint.txt || true
          SECURITY_ISSUES=$(grep -i "security\|xss\|injection" /tmp/eslint.txt | wc -l || echo 0)
          [ "$SECURITY_ISSUES" -eq 0 ] && echo "✅ No security linting issues" || echo "⚠️  Found $SECURITY_ISSUES issues"

      # Corregido 2026-07-16 (docs/hallazgos/2026-07-16_auditoria_gaps_no_revisados.md
      # #3): "npm audit" nunca corría en ningún workflow — el hallazgo real de hoy
      # (xlsx con 2 CVE HIGH) solo se encontró con una corrida manual. A diferencia del
      # step "OWASP Dependency Check" de abajo (cosmético: `|| true` en toda la cadena +
      # `continue-on-error: true`, nunca puede fallar el build), este SÍ es un gate real:
      # sin `|| true` ni continue-on-error, el exit code no-cero de `npm audit` ante
      # HIGH/CRITICAL bloquea el job.
      - name: npm audit (Frontend, bloqueante)
        run: |
          cd frontend
          npm audit --omit=dev --audit-level=high

      - name: Check for SQL concatenation
        run: |
          CONCAT=$(grep -r "'+'" backend-spring/src --include="*.java" 2>/dev/null | wc -l || echo 0)
          if [ "$CONCAT" -gt 0 ]; then
            echo "::warning::Found $CONCAT SQL concatenation vulnerabilities"
          else
            echo "✅ No SQL concatenation detected"
          fi

      - name: TLS/HTTPS headers
        run: |
          MISSING_HEADERS=0
          grep -q "Strict-Transport-Security" nginx.conf || MISSING_HEADERS=$((MISSING_HEADERS+1))
          grep -q "X-Content-Type-Options" nginx.conf || MISSING_HEADERS=$((MISSING_HEADERS+1))
          grep -q "X-Frame-Options" nginx.conf || MISSING_HEADERS=$((MISSING_HEADERS+1))
          grep -q "Content-Security-Policy" nginx.conf || MISSING_HEADERS=$((MISSING_HEADERS+1))

          if [ "$MISSING_HEADERS" -gt 0 ]; then
            echo "::warning::Missing $MISSING_HEADERS security headers in nginx"
          else
            echo "✅ All security headers present"
          fi

      - name: OWASP Dependency Check
        run: |
          # Download if not in cache
          if [ ! -d "$HOME/dependency-check" ]; then
            curl -sSLf -o dependency-check.zip https://github.com/jeremylong/DependencyCheck/releases/download/v10.0.4/dependency-check-10.0.4-release.zip || \
            curl -sSLf -o dependency-check.zip https://github.com/jeremylong/DependencyCheck/releases/download/v9.2.0/dependency-check-9.2.0-release.zip || true
            
            if [ -f dependency-check.zip ]; then
              unzip -q dependency-check.zip -d "$HOME/" || true
              rm -f dependency-check.zip
            fi
          fi

          # Corregido 2026-07-16 (docs/hallazgos/2026-07-16_auditoria_gaps_no_revisados.md
          # #3): antes este step era enteramente cosmético (`|| true` en cada comando +
          # continue-on-error abajo) — nunca podía fallar el build sin importar cuántas
          # vulnerabilidades encontrara. El `|| true` de la DESCARGA se mantiene (un
          # fallo de red/GitHub releases no es evidencia de una vulnerabilidad real, no
          # debe bloquear el merge); el del ESCANEO se quita.
          if [ -x "$HOME/dependency-check/bin/dependency-check.sh" ]; then
            "$HOME/dependency-check/bin/dependency-check.sh" \
              --project "ADES" \
              --scan . \
              --format JSON \
              --out /tmp/dependency-check.json
          else
            echo "⚠️ Dependency Check binary not found or not executable — scan omitido, no bloquea (fallo de descarga, no de dependencias)"
          fi

          python << 'EOF'
          import json, sys
          try:
            with open('/tmp/dependency-check.json') as f:
              data = json.load(f)
          except FileNotFoundError:
            print("ℹ️  Dependency check omitido (descarga del binario falló) — no bloquea")
            sys.exit(0)

          # Solo bloquea si el JSON se parseó correctamente Y hay hallazgos reales
          # HIGH/CRITICAL — un cambio de schema entre versiones del binario no debe
          # colapsar a "0 vulnerabilidades" silenciosamente ni tampoco a un fallo
          # espurio del job por un KeyError.
          deps = data.get('dependencies', [])
          altos = []
          for dep in deps:
            for v in dep.get('vulnerabilities', []) or []:
              severidad = (
                  (v.get('cvssv3') or {}).get('baseSeverity')
                  or (v.get('cvssv2') or {}).get('severity')
                  or ''
              ).upper()
              if severidad in ('HIGH', 'CRITICAL'):
                altos.append(f"{dep.get('fileName', '?')}: {v.get('name', '?')} ({severidad})")

          if altos:
            print(f"::error::{len(altos)} vulnerabilidades HIGH/CRITICAL encontradas:")
            for a in altos[:10]:
              print(f"  {a}")
            sys.exit(1)
          print("✅ Sin vulnerabilidades HIGH/CRITICAL en dependency-check")
          EOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: /tmp/*.json
          retention-days: 30

      - name: Comment PR with security summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🔐 Security Audit Results\n\n✅ Python (Bandit)\n✅ Frontend (ESLint)\n✅ Dependencies (Safety)\n✅ HTTPS Headers\n\nSee artifacts for detailed scan results.`
            })
        continue-on-error: true

  backup-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PostgreSQL
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: 18

      - name: Test backup script
        run: |
          # Mock environment
          export DB_PASSWORD=test

          # Create test backup
          mkdir -p /tmp/backups

          # Simulate full backup creation
          echo "PGDMP" > /tmp/backups/ades-test.dump
          echo "REDIS" > /tmp/backups/valkey-test.rdb

          # Verify files exist
          [ -f /tmp/backups/ades-test.dump ] || exit 1
          [ -f /tmp/backups/valkey-test.rdb ] || exit 1

          echo "✅ Backup test passed"

  notify:
    runs-on: ubuntu-latest
    needs: [security, backup-test]
    if: failure()

    steps:
      - name: Slack notification
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🚨 ADES Security audit failed",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Check GitHub Actions for details"
                }
              }]
            }' || true
        continue-on-error: true
