name: E2E Tests CI/CD

# ── Por qué este workflow se reescribió (2026-07-19) ──────────────────────────
# La versión anterior intentaba reconstruir todo el stack (Postgres, Valkey,
# Authentik) desde cero en runners efímeros de GitHub. Nunca funcionó de
# verdad: `psql < db/migrations/*.sql` (170 archivos) es un "ambiguous
# redirect" de bash y falla siempre; el seed referenciaba un archivo que no
# existe (`db/seeds/001_base.sql`, el real es `001_datos_base.sql`); y
# Authentik (server + worker + blueprints custom en
# ./infrastructure/authentik/, que crean el OAuth2Provider `ades-frontend`
# que `e2e/global-setup.ts` necesita) no puede arrancar en un bloque
# `services:` de GitHub Actions — confirmado en vivo el 2026-07-19 (push
# 83d5304: el job falló en 43s en "Initialize containers", antes de correr
# un solo paso). Además `continue-on-error: true` en todos los pasos de
# test hacía que ni siquiera los specs que sí corrían pudieran fallar el
# job — nunca fue un gate real.
#
# Este workflow corre en un runner self-hosted instalado directamente en
# ades.setag.mx (`/opt/ades/.github-runner/`), el mismo host donde el stack
# real (Vault, Authentik ya inicializado con sus blueprints, Postgres con
# datos reales) ya vive y funciona. Por eso ya NO reconstruye nada: usa la
# app YA desplegada y corriendo, tal como se verificó manualmente durante
# la sesión que diagnosticó este problema (E2E real contra
# https://ades.setag.mx, framework `LoginPage`/`global-setup.ts` del propio
# proyecto).
#
# ── Riesgo de seguridad, explícito (decisión del dueño del proyecto) ──────────
# Un runner self-hosted con acceso a Docker en el mismo host que la base de
# datos real de producción equivale a ejecución de código con privilegios
# de root en ese host, para cualquiera que pueda pushear a `main`. Por eso:
#   - SIN trigger `pull_request` — un PR desde un fork de cualquier usuario
#     (repo público) no debe poder ejecutar código en este runner.
#   - Solo `push` a `main`/`develop` (ramas que solo el propio equipo puede
#     escribir) + una corrida diaria programada.
#
# ── Qué NO hace este workflow (a propósito) ────────────────────────────────
#   - NO reconstruye ni reinicia ades-bff/ades-api/ades-frontend (evita
#     downtime en el único servidor).
#   - NO corre migraciones (se aplican manualmente, una por una, verificadas
#     contra datos reales — igual que el resto de este proyecto).
#   - NO corre el seed realista `006_simulacion_integral.py` — es
#     DESTRUCTIVO ("cada corrida re-vacía lo operativo y regenera"). Jamás
#     debe dispararse automáticamente contra la base de datos real.
#
# ── Trade-off aceptado, documentado — no oculto ────────────────────────────
# Los specs (02-alumnos, 06-chaos, 09-concurrency, ...) SÍ crean registros de
# prueba reales vía la UI (alumnos con nombres generados por faker) y no los
# limpian después. Con el tiempo esto acumula datos de prueba reconocibles
# en la base real. Es un trade-off aceptado dado que este proyecto no tiene
# un entorno separado por diseño (ver CLAUDE.md) — no una omisión.
#
# El paso de contratos API corre en un contenedor node desechable (no
# necesita acceso a Docker). El paso de E2E corre Playwright DIRECTO en el
# runner (no en un contenedor anidado): `global-setup.ts` necesita invocar
# `docker compose exec authentik-server ...` contra el daemon de Docker
# real del host para emitir un JWT de prueba — eso requiere el CLI de
# docker + el socket, que la imagen oficial de Playwright no trae, y montar
# el socket a mano dentro de un contenedor anidado es frágil. Requisito de
# una sola vez en el runner (parte de su instalación, no de cada corrida):
# Node 22 + `npx playwright install --with-deps chromium`.

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 9 * * *'  # diario 9am UTC

jobs:
  e2e:
    runs-on: [self-hosted, ades]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Check API Contracts
        run: |
          docker run --rm -v "$(pwd)":/work -w /work node:22-alpine \
            node scripts/check-api-contracts.js --strict

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run E2E suite (21 specs) against the live app
        working-directory: frontend
        env:
          BASE_URL: https://ades.setag.mx
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
