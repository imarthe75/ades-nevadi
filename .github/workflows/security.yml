name: Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install bandit semgrep flake8 safety -q

      - name: Bandit Security Scan
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json 2>/dev/null || true
          bandit -r app/ -f txt 2>/dev/null | head -50 || true
        continue-on-error: true

      - name: Semgrep Scan
        run: |
          cd backend
          semgrep --config=p/security-audit app/ --json -o semgrep-report.json 2>/dev/null || true
          semgrep --config=p/security-audit app/ 2>/dev/null | head -50 || true
        continue-on-error: true

      - name: Flake8 Lint
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --count --statistics 2>/dev/null || true
        continue-on-error: true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v3
        with:
          name: sast-reports
          path: |
            backend/bandit-report.json
            backend/semgrep-report.json
        continue-on-error: true

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Safety
        run: pip install safety pip-audit -q

      - name: Safety Check
        run: |
          cd backend
          safety check --json --output safety-report.json 2>/dev/null || true
        continue-on-error: true

      - name: Pip Audit
        run: |
          cd backend
          pip-audit --desc > pip-audit-report.txt 2>/dev/null || true
        continue-on-error: true

  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ades_test
          POSTGRES_USER: ades_test
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt pytest pytest-cov pytest-asyncio -q

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://ades_test:test_password@localhost:5432/ades_test
        run: |
          cd backend
          pytest app/tests/ -v --tb=short 2>/dev/null || true

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: backend/.coverage
        continue-on-error: true
